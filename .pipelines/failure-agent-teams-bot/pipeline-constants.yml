# Target Teams team groupId.
- name: notifyTeamId
  value: '1eb27b57-8ace-4f0e-a9a9-e6db4e9829b7'

# Target Teams channel id (URL-decoded).
- name: notifyChannelId
  value: '19:e810e8f1d12741198af77c3743a2eecf@thread.skype'
