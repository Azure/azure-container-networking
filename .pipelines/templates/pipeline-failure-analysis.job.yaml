# Reusable job template: Pipeline Task-Log Failure Analysis
#
# Use this for non-E2E failures (image builds, binary builds, manifests, setup,
# unit-test infra, signing, etc.) where the evidence lives in Azure DevOps task
# logs rather than a cluster failure artifact.
#
# This template downloads the ADO build timeline and task logs for the current
# run, writes them as the evidence bundle, and runs the failure-agent CLI in
# non-live mode (no kubectl). It produces the same report.md + incident.json
# artifacts as the E2E failure-analysis path.
#
# Wire this as a stage or job that runs on condition: failed() after the build
# stage. It does NOT affect E2E failure analysis, cluster retention, or teardown.

parameters:
  # Human-readable scope label for the analysis artifact name.
  scope: "build"
  # Override pipeline name if needed.
  pipeline: ""
  # Dry-run skips PR write-back (analysis still runs).
  dryRun: false

jobs:
  - job: pipelineFailureAnalysis_${{ parameters.scope }}
    displayName: "Pipeline Failure Analysis (${{ parameters.scope }})"
    pool:
      type: linux
      isCustom: true
      name: $(BUILD_POOL_NAME_DEFAULT)
      demands:
        - agent.os -equals Linux
    timeoutInMinutes: 10
    variables:
      - template: ../failure-agent-teams-bot/pipeline-constants.yml
      - name: ob_outputDirectory
        value: $(Build.ArtifactStagingDirectory)/out
    steps:
      - checkout: self

      - task: GoTool@0
        inputs:
          version: '1.25'
        displayName: "Setup Go"

      # Collect ADO build timeline and only the FAILED task logs as the evidence
      # bundle, so the agent focuses on what actually broke instead of dozens of
      # green tasks. focus_timeline.py also records the real failed Stage/Job.
      - script: |
          set -euo pipefail

          export EVIDENCE="$(Agent.TempDirectory)/evidence"
          mkdir -p "$EVIDENCE/logs"
          export ADO_BUILD_BASE_URL="${SYSTEM_COLLECTIONURI}${SYSTEM_TEAMPROJECT}/_apis/build/builds/${BUILD_BUILDID}"

          python3 "$(Build.SourcesDirectory)/.pipelines/scripts/failure-analysis/focus_timeline.py"

          # Make the base branch available so the agent can diff the change under
          # test. Best-effort: grounding degrades to logs-only on fetch failure.
          BASE_BRANCH="${SYSTEM_PULLREQUEST_TARGETBRANCHNAME:-master}"
          git -C "$(Build.SourcesDirectory)" fetch --no-tags --depth=200 origin \
            "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}" || true

          # Write run metadata for the agent's RunContext.
          cat > "$EVIDENCE/run-metadata.json" <<EOF
          {
            "pipelineName": "${BUILD_DEFINITIONNAME}",
            "buildId": "${BUILD_BUILDID}",
            "buildNumber": "${BUILD_BUILDNUMBER}",
            "repository": "${BUILD_REPOSITORY_NAME}",
            "sourceBranch": "${BUILD_SOURCEBRANCH}",
            "sourceVersion": "${BUILD_SOURCEVERSION}",
            "reason": "${BUILD_REASON}",
            "scope": "${{ parameters.scope }}"
          }
          EOF

          echo "Evidence collected: $(find "$EVIDENCE" -type f | wc -l) files"
          ls -la "$EVIDENCE"
          echo "=== focus.txt ==="
          cat "$EVIDENCE/focus.txt" 2>/dev/null || echo "(no focus.txt)"
          ls -la "$EVIDENCE/logs" | head -30
        displayName: "Collect focused ADO failure logs"
        env:
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)

      # Run the failure-agent in non-live mode against the collected ADO logs.
      - script: |
          set -euo pipefail

          INPUT_DIR="$(Agent.TempDirectory)/evidence"
          OUTPUT_DIR="$(Agent.TempDirectory)/analysis"
          mkdir -p "$OUTPUT_DIR"

          if [ -z "${AZURE_OPENAI_ENDPOINT:-}" ] || [ -z "${AZURE_OPENAI_DEPLOYMENT:-}" ]; then
            echo "##[warning]Azure OpenAI credentials not configured; the agent will emit an analysis_failed incident preserving raw evidence."
          fi

          # Build args as an array so stage/job names with spaces stay one token.
          ARGS=(
            --input "$INPUT_DIR"
            --output "$OUTPUT_DIR"
            --signatures signatures/signatures.yaml
            --repo-root "$(Build.SourcesDirectory)"
            --live=false
            --privileged=false
          )
          if [ -n "${{ parameters.pipeline }}" ]; then
            ARGS+=(--pipeline "${{ parameters.pipeline }}")
          fi
          # FAILED_STAGE / FAILED_JOB are set by focus_timeline.py from the ADO
          # timeline so the agent reports the real failed unit, not this job.
          if [ -n "${FAILED_STAGE:-}" ]; then
            ARGS+=(--stage-name "$FAILED_STAGE")
          fi
          if [ -n "${FAILED_JOB:-}" ]; then
            ARGS+=(--job-name "$FAILED_JOB")
          fi
          if [ "${{ parameters.dryRun }}" = "True" ] || [ "${{ parameters.dryRun }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          cd "$(Build.SourcesDirectory)/tools/failure-agent"
          go run . "${ARGS[@]}"
        displayName: "Run failure analysis (non-live)"
        env:
          AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
          AZURE_OPENAI_DEPLOYMENT: $(AZURE_OPENAI_DEPLOYMENT)
          AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
          AZURE_OPENAI_API_VERSION: $(AZURE_OPENAI_API_VERSION)
          GITHUB_TOKEN: $(GITHUB_TOKEN)

      - task: AzureCLI@2
        displayName: "Notify Teams (failure analysis)"
        condition: succeededOrFailed()
        continueOnError: true
        inputs:
          azureSubscription: acn-dalec-test
          scriptType: bash
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          inlineScript: |
            bash "$(Build.SourcesDirectory)/.pipelines/failure-agent-teams-bot/scripts/notify-incident.sh" \
              "$(Agent.TempDirectory)/analysis/incident.json"
        env:
          NOTIFIER_ENDPOINT: $(notifierEndpoint)
          NOTIFIER_API_AUDIENCE: $(notifierApiAudience)
          NOTIFY_SOURCE: $(notifySource)
          NOTIFY_RUN_ID: $(Build.BuildId)
          NOTIFY_TEAM_ID: $(notifyTeamId)
          NOTIFY_CHANNEL_ID: $(notifyChannelId)
          SYSTEM_ACCESSTOKEN: $(System.AccessToken)

      - script: |
          set -euo pipefail
          OUTPUT_DIR="$(Agent.TempDirectory)/analysis"
          echo "=== Agent output files ==="
          ls -la "$OUTPUT_DIR" 2>/dev/null || echo "(no output directory)"
          echo ""
          for f in "$OUTPUT_DIR"/*; do
            [ -f "$f" ] || continue
            echo "========== $(basename "$f") =========="
            cat "$f"
            echo ""
          done
        displayName: "Dump agent output to logs"
        condition: succeededOrFailed()

      - script: |
          set -euo pipefail
          REPORT="$(Agent.TempDirectory)/analysis/report.md"
          OUT_DIR="$(Build.ArtifactStagingDirectory)/out"
          mkdir -p "$OUT_DIR"
          if [ -f "$REPORT" ]; then
            echo "##vso[task.uploadsummary]$REPORT"
            cp "$REPORT" "$OUT_DIR/report.md"
            cp "$(Agent.TempDirectory)/analysis/incident.json" "$OUT_DIR/incident.json" 2>/dev/null || true
          fi
        displayName: "Publish analysis summary"
        condition: succeededOrFailed()

      - publish: $(Build.ArtifactStagingDirectory)/out
        artifact: pipelineFailureAnalysis_${{ parameters.scope }}
        displayName: "Publish analysis artifact"
        condition: succeededOrFailed()
