parameters:
  - name: clusterName
    type: string
  - name: networkType
    type: string
  - name: azureIpamVersion
    type: string
  - name: cnsVersion
    type: string
  - name: cniVersion
    type: string
  - name: installFlag
    type: string
  - name: os
    type: string
    default: linux
  - name: scaleup
    type: number
    default: 32
  - name: testHubble
    type: boolean
    default: false
  - name: nightly
    type: boolean
    default: false

steps:
  - task: KubectlInstaller@0
    inputs:
      kubectlVersion: latest

  - ${{ if startsWith(parameters.networkType, 'cilium') }}:
    - template: cilium-cli.yaml

  - ${{ if startsWith(parameters.networkType, 'cilium') }}:
    - task: AzureCLI@2
      displayName: Install Cilium networking
      inputs:
        azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
        scriptLocation: inlineScript
        scriptType: bash
        addSpnToEnvironment: true
        inlineScript: |
          set -e
          make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}
          kubectl cluster-info

          configure_ebpf() {
            export AZURE_IPTABLES_MONITOR_IMAGE_REGISTRY=acnpublic.azurecr.io
            export AZURE_IPTABLES_MONITOR_TAG=$(make azure-iptables-monitor-version)
          }

          configure_ebpf_overlay() {
            configure_ebpf
            export AZURE_IP_MASQ_MERGER_IMAGE_REGISTRY=acnpublic.azurecr.io
            export AZURE_IP_MASQ_MERGER_TAG=$(make azure-ip-masq-merger-version)
          }

          configure_dualstack() {
            export IPV6_HP_BPF_VERSION=${IPV6_HP_BPF_VERSION:-$(make ipv6-hp-bpf-version)}
            export IPV6_IMAGE_REGISTRY=${IPV6_IMAGE_REGISTRY:-acnpublic.azurecr.io}
            if [ -n "$IPV6_HP_BPF_IMAGE_REPO_PATH" ]; then
              export IPV6_IMAGE_REGISTRY="$IPV6_IMAGE_REGISTRY/$IPV6_HP_BPF_IMAGE_REPO_PATH"
            fi
            export IPV6_HP_BPF_IMAGE_REGISTRY="$IPV6_IMAGE_REGISTRY"
          }

          case "${{ parameters.networkType }}" in
            cilium-podsubnet)
              unset DIR CILIUM_VERSION_TAG
              make -C ./hack/aks deploy-cilium
              ;;
            cilium-nodesubnet)
              SECONDARY_IP_COUNT=$(( ${{ parameters.scaleup }} * 2 )) \
              RESOURCE_GROUP="MC_${{ parameters.clusterName }}_${{ parameters.clusterName }}_$(REGION_AKS_CLUSTER_TEST)" \
              go run $(Build.SourcesDirectory)/test/integration/cilium-nodesubnet/ipconfigupdate.go
              unset DIR CILIUM_VERSION_TAG
              make -C ./hack/aks deploy-cilium
              ;;
            cilium-overlay)
              NIGHTLY_TAG="$CILIUM_VERSION_TAG"
              unset DIR CILIUM_VERSION_TAG
              if [ "${{ parameters.testHubble }}" = "True" ]; then
                make -C ./hack/aks deploy-cilium-hubble
              elif [ "$NIGHTLY_TAG" = "cilium-nightly-pipeline" ] || [ "${{ parameters.nightly }}" = "True" ]; then
                make -C ./hack/aks deploy-cilium-nightly
              else
                make -C ./hack/aks deploy-cilium
              fi
              ;;
            cilium-dualstack)
              configure_dualstack
              unset DIR CILIUM_VERSION_TAG
              make -C ./hack/aks deploy-cilium-dualstack
              ;;
            cilium-ebpf-podsubnet)
              configure_ebpf
              make -C ./hack/aks deploy-ebpf-podsubnet-cilium
              ;;
            cilium-ebpf-overlay)
              configure_ebpf_overlay
              make -C ./hack/aks deploy-ebpf-overlay-cilium
              ;;
            cilium-ebpf-dualstack)
              configure_ebpf_overlay
              configure_dualstack
              make -C ./hack/aks deploy-ebpf-dualstack-cilium
              ;;
            *)
              echo "Unsupported networkType: ${{ parameters.networkType }}"
              exit 1
              ;;
          esac

          export CILIUM_LOG_COLLECTOR_IMAGE_REGISTRY=${CILIUM_LOG_COLLECTOR_IMAGE_REGISTRY_OVERRIDE:-acnpublic.azurecr.io}
          export CILIUM_LOG_COLLECTOR_VERSION_TAG=${CILIUM_LOG_COLLECTOR_VERSION_TAG_OVERRIDE:-$(make cilium-log-collector-version)}
          make -C ./hack/aks add-cilium-log-collector
          kubectl get pods -A -o wide

  - task: AzureCLI@2
    displayName: Install ACN Networking
    inputs:
      azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
      scriptLocation: inlineScript
      scriptType: bash
      addSpnToEnvironment: true
      inlineScript: |
        set -e
        make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}
        kubectl cluster-info

        CNI_TYPE=cniv2
        case "${{ parameters.networkType }}" in
          cilium-dualstack|cilium-ebpf-dualstack)
            CNI_TYPE=cilium_dualstack
            ;;
          cilium-*)
            CNI_TYPE=cilium
            ;;
          azure-vnet|azure-cni-overlay|azure-cni-overlay-stateless|azure-cni-dualstack-overlay)
            ;;
          *)
            echo "Unsupported networkType: ${{ parameters.networkType }}"
            exit 1
            ;;
        esac

        sudo -E env "PATH=$PATH" make test-load \
          CNS_ONLY=true \
          OS_TYPE=${{ parameters.os }} \
          CNI_TYPE="$CNI_TYPE" \
          INSTALL_CNS=true \
          ${{ parameters.installFlag }}=true \
          AZURE_IPAM_VERSION=${{ parameters.azureIpamVersion }} \
          CNS_VERSION=${{ parameters.cnsVersion }} \
          CNI_VERSION=${{ parameters.cniVersion }} \
          IPAM_IMAGE_NAME_OVERRIDE=$(IPAM_IMAGE_NAME_OVERRIDE) \
          CNS_IMAGE_NAME_OVERRIDE=$(CNS_IMAGE_NAME_OVERRIDE) \
          CNI_IMAGE_NAME_OVERRIDE=$(CNI_IMAGE_NAME_OVERRIDE)
