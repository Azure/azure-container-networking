# -- Captures --
# CNS, CNI, and Cilium Logs
# CNS, CNI, and Cilium State files
# Daemonset and Deployment Images
# Node Status
# kube-system namespace logs
# Non-ready pods on failure
# -- Controled by --
# CNI and OS | ${{ parameters.cni }} and ${{ parameters.os }}
# CNS ConfigMap | "ManageEndpointState"
# -- Generates --
# Logs on a per-node basis
# Outputs a singluar unique artifact per template call | ${{ parameters.clusterName }}_${{ parameters.jobName }}_Attempt_#$(System.StageAttempt)
# Each artifact is divided into sub-directories
# -- Intent --
# Provide through debugging information to understand why CNI test scenarios are failing without having to blindly reproduce

parameters:
  clusterName: ""
  logType: "failure"
  os: ""
  cni: ""
  jobName: "FailedE2ELogs"
  # Failure-analysis-agent wiring. Runs in-place in each E2E stage's failure job,
  # while the cluster is still alive and kubeconfig is already set, against the
  # evidence bundle just collected into $(acnLogs). Set runFailureAnalysis: false
  # on a specific call to opt a scenario out.
  runFailureAnalysis: true
  live: true
  privileged: true
  agentProject: "One"
  agentRepo: "Networking-ACN-Agent"
  agentRef: "amaro/failure-analysis-agent"
  goVersion: "1.24.1"

steps:
  - task: AzureCLI@2
    inputs:
      azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
      scriptLocation: "inlineScript"
      scriptType: "bash"
      addSpnToEnvironment: true
      inlineScript: |
          make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}

          acnLogs=$(System.DefaultWorkingDirectory)/${{ parameters.clusterName }}_${{ parameters.logType }}_Attempt_#$(System.StageAttempt)
          mkdir -p $acnLogs
          echo "Root Directory created: $acnLogs"
          echo "##vso[task.setvariable variable=acnLogs]$acnLogs"

          kubectl get pods -n kube-system -owide
          podList=`kubectl get pods -n kube-system --no-headers | awk '{print $1}'`
          mkdir -p $acnLogs/kube-system
          echo "Directory created: $acnLogs/kube-system"
          for pod in $podList; do
            kubectl logs -n kube-system $pod > $acnLogs/kube-system/$pod-logs.txt
            echo "$acnLogs/kube-system/$pod-logs.txt"
          done
    displayName: Kube-System Logs
    condition: always()
    continueOnError: true # Tends to fail after node restart due to pods still restarting. This should not block other tests or logs from running.

  - bash: |
      set -o pipefail
      kubectl get pods -A -owide 2>&1 | tee "$(acnLogs)/all-pods.txt"
    displayName: All Pods
    condition: always()

  - bash: |
      set -o pipefail
      bash hack/scripts/collect-bad-pod-info.sh 2>&1 | tee "$(acnLogs)/bad-pod-info.txt"
    displayName: Collect Bad Pod Info
    condition: always()
    continueOnError: true

  - bash: |
      set -o pipefail
      kubectl describe nodes 2>&1 | tee "$(acnLogs)/node-status.txt"
    displayName: Node Status
    condition: always()
  
  - bash: |
      set -o pipefail
      kubectl describe nnc -A 2>&1 | tee "$(acnLogs)/node-network-configs.txt"
    displayName: Describe Node Network Configs (NNCs)
    condition: and(always(), ne('${{ parameters.cni }}', 'cniv1')) # cniv1/nodesubnet scenarios do not have node network configs
    continueOnError: true # even if nnc doesn't exist we want to continue

  - bash: |
      set -o pipefail
      {
        kubectl get ds -A -owide
        echo "Capture daemonset images being used"
        dsList=`kubectl get ds -A | grep kube-system | awk '{print $2}'`
        for ds in $dsList; do
          echo "$ds"
          kubectl describe ds -n kube-system $ds | grep Image
        done
      } 2>&1 | tee "$(acnLogs)/daemonset-images.txt"
    displayName: Daemonset Images
    condition: always()

  - bash: |
      set -o pipefail
      {
        kubectl get deploy -A -owide
        echo "Capture deployment images being used"
        deployList=`kubectl get deploy -A | grep kube-system | awk '{print $2}'`
        for deploy in $deployList; do
          echo "$deploy"
          kubectl describe deploy -n kube-system $deploy | grep Image
        done
      } 2>&1 | tee "$(acnLogs)/deployment-images.txt"
    displayName: Deployment Images
    condition: always()

  - ${{ if eq(parameters.logType, 'failure') }}:
    - bash: |
        kubectl get pods -n kube-system -o custom-columns=NAME:.metadata.name,STATUS:.status.phase,NODE:.spec.nodeName
        podList=`kubectl get pods -n kube-system -o custom-columns=NAME:.metadata.name,STATUS:.status.phase,NODE:.spec.nodeName --no-headers | grep -v Running | awk '{print $1}'`
        array=($podList)

        if [ -z ${array[0]} ]; then
          echo "There are no kube-system pods in a non-ready state."
        else
          mkdir -p $(acnLogs)/${{ parameters.os }}non-ready
          echo "Directory created: $(acnLogs)/${{ parameters.os }}non-ready"
          echo "Capturing failed pods"
          for pod in $podList; do
            kubectl describe pod -n kube-system $pod > $(acnLogs)/${{ parameters.os }}non-ready/$pod.txt
            echo "$(acnLogs)/${{ parameters.os }}non-ready/$pod.txt"
          done
        fi
      displayName: Failure Logs
      condition: always()

  - ${{ if eq(parameters.os, 'linux') }}:
    - script: |
        cd hack/scripts
        acnLogs=$(acnLogs) cni=${{ parameters.cni }} bash collect-linux-logs.sh
      displayName: Linux Logs
      condition: always()

  - ${{ if eq(parameters.os, 'windows') }}:
    - script: |
        cd hack/scripts
        acnLogs=$(acnLogs) cni=${{ parameters.cni }} bash collect-windows-logs.sh
      displayName: Windows Logs
      condition: always()

  # -- Failure analysis (live) --
  # Runs only on failure log collection. The cluster is still alive here (delete
  # is a later stage that depends on this E2E stage), kubeconfig is already set by
  # the Kube-System Logs step above, and $(acnLogs) holds the evidence bundle.
  # Every step is continueOnError so analysis never fails the CI failure job.
  - ${{ if and(eq(parameters.runFailureAnalysis, true), eq(parameters.logType, 'failure')) }}:
    - task: GoTool@0
      inputs:
        version: "${{ parameters.goVersion }}"
      displayName: "Failure Analysis - Install Go"
      condition: always()
      continueOnError: true

    - bash: |
        set -euo pipefail
        AGENT_DIR="$(Agent.TempDirectory)/acn-failure-agent"
        rm -rf "$AGENT_DIR"
        git -c http.extraheader="AUTHORIZATION: bearer ${SYSTEM_ACCESSTOKEN}" \
          clone --depth 1 --branch "${{ parameters.agentRef }}" \
          "$(System.CollectionUri)${{ parameters.agentProject }}/_git/${{ parameters.agentRepo }}" \
          "$AGENT_DIR"
      displayName: "Failure Analysis - Fetch shared agent"
      condition: always()
      continueOnError: true
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)

    - bash: |
        set -euo pipefail
        AGENT_DIR="$(Agent.TempDirectory)/acn-failure-agent"
        OUT="$(acnLogs)/failure-analysis"
        mkdir -p "$OUT"
        cd "$AGENT_DIR/agents/failure-analysis-agent"
        go run . \
          --profile "$(Build.SourcesDirectory)/ci/failure-profile.yaml" \
          --input "$(acnLogs)" \
          --output "$OUT" \
          --live=${{ lower(parameters.live) }} \
          --privileged=${{ lower(parameters.privileged) }}
      displayName: "Failure Analysis - Run agent (live)"
      condition: always()
      continueOnError: true
      env:
        AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
        AZURE_OPENAI_DEPLOYMENT: $(AZURE_OPENAI_DEPLOYMENT)
        AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
        AZURE_OPENAI_API_VERSION: $(AZURE_OPENAI_API_VERSION)
        GITHUB_TOKEN: $(GITHUB_TOKEN)

  - publish: $(System.DefaultWorkingDirectory)/${{ parameters.clusterName }}_${{ parameters.logType }}_Attempt_#$(System.StageAttempt)
    condition: always()
    artifact: ${{ parameters.clusterName }}_${{ parameters.logType }}_${{ parameters.os }}${{ parameters.jobName }}_Attempt_#$(System.StageAttempt)
    name: acnLogs_${{ parameters.logType }}
    displayName: Publish Cluster logs
