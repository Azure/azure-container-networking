parameters:
  - name: targetBranch
    type: string
    default: ""

steps:
  - checkout: self
    displayName: 'Checkout Repository'
    fetchDepth: 0

  - script: |
      set -e
      
      # Auto-detect target branch if not specified
      TARGET_BRANCH="${{ parameters.targetBranch }}"
      if [ -z "$TARGET_BRANCH" ]; then
        if [ -n "$PRTARGETBRANCH" ]; then
          TARGET_BRANCH="$PRTARGETBRANCH"
          echo "Auto-detected target branch from PR: $TARGET_BRANCH"
        else
          TARGET_BRANCH="master"
          echo "Auto-detected target branch (default): $TARGET_BRANCH"
        fi
      else
        echo "Using provided target branch: $TARGET_BRANCH"
      fi
      
      echo "=== Git Diff Check Configuration ==="
      echo "Current branch: $(Build.SourceBranchName)"
      echo "Current commit: $(Build.SourceVersion)"
      echo "Target branch: $TARGET_BRANCH"
      
      OUTPUT=$(bash hack/scripts/check-changed-files.sh "$TARGET_BRANCH")
      echo "$OUTPUT"
      
      RUN_WINDOWS_TESTS=false
      RUN_CILIUM_TESTS=false
      echo "$OUTPUT" | grep -q '^RUN_WINDOWS_TESTS=true$' && RUN_WINDOWS_TESTS=true
      echo "$OUTPUT" | grep -q '^RUN_CILIUM_TESTS=true$' && RUN_CILIUM_TESTS=true
      
      echo "##vso[task.setvariable variable=RunWindowsTests;isOutput=true]$RUN_WINDOWS_TESTS"
      echo "##vso[task.setvariable variable=RunCiliumTests;isOutput=true]$RUN_CILIUM_TESTS"
    name: GitDiffCheck
    displayName: "Check Git Diff"
    condition: always()
