parameters:
  - name: clusterName
    type: string
  - name: cniVersion
    type: string
  - name: os
    type: string
    default: linux

steps:
  - task: KubectlInstaller@0
    inputs:
      kubectlVersion: latest

  - task: AzureCLI@2
    displayName: Install CNI v1
    inputs:
      azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
      scriptLocation: inlineScript
      scriptType: bash
      addSpnToEnvironment: true
      inlineScript: |
        set -e
        make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}
        kubectl cluster-info

        get_image_registry() {
          case "$1" in
            MCR) echo "mcr.microsoft.com/containernetworking" ;;
            *) echo "acnpublic.azurecr.io" ;;
          esac
        }

        repo=$(get_image_registry "$CNI_IMAGE_REPO")
        name="${CNI_IMAGE_NAME_OVERRIDE:-azure-cni}"
        version="${{ parameters.cniVersion }}"
        if [[ "$version" == @* ]]; then
          CNI_IMAGE="${repo}/${name}${version}"
        else
          CNI_IMAGE="${repo}/${name}:${version}"
        fi
        export CNI_IMAGE

        echo "Deploying Linux CNI image: $CNI_IMAGE"
        envsubst '${CNI_IMAGE}' < ./test/integration/manifests/cni/cni-installer-v1.yaml | kubectl apply -f -
        kubectl rollout status daemonset/azure-cni -n kube-system

        if [ "${{ parameters.os }}" = "windows" ]; then
          echo "Deploying Windows CNI image: $CNI_IMAGE"
          envsubst '${CNI_IMAGE}' < ./test/integration/manifests/cni/cni-installer-v1-windows.yaml | kubectl apply -f -
          kubectl rollout status daemonset/azure-cni-windows -n kube-system
        fi
