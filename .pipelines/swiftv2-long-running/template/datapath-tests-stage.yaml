parameters:
  - name: workloadType
    type: string
  - name: location
    type: string
  - name: subscriptionId
    type: string
  - name: stageLabel
    type: string
  - name: rgName
    type: string
  - name: leaseAcquired
    type: string
    default: 'true'
  - name: dependsOn
    type: object
    default: []

stages:
  - stage: DataPathTests_${{ replace(parameters.workloadType, '-', '_') }}_${{ replace(parameters.stageLabel, '-', '_') }}
    displayName: "Swiftv2 Data Path Tests - ${{ parameters.workloadType }} (${{ parameters.stageLabel }})"
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(eq(variables.isAllowedRun, true), not(canceled()), eq(dependencies.AcquireLease_${{ replace(parameters.stageLabel, '-', '_') }}.outputs['AcquireLease.AcquireLeaseStep.leaseAcquired'], 'true'))
    variables:
      leaseAcquired: ${{ parameters.leaseAcquired }}
    jobs:
      - job: SetupKubeconfig
        displayName: "Setup Kubeconfig Files"
        steps:
          - task: AzureCLI@2
            displayName: "Generate and verify kubeconfig files"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -x
                echo "==> Subscription: ${{ parameters.subscriptionId }}"
                echo "==> Resource Group: ${{ parameters.rgName }}"
                echo "==> Stage Label: ${{ parameters.stageLabel }}"
                echo "==> Workload Type: ${{ parameters.workloadType }}"
                mkdir -p $(Pipeline.Workspace)/kubeconfigs
                
                echo "==> Setting up kubeconfig for cluster aks-1"
                az aks get-credentials \
                  --resource-group ${{ parameters.rgName }} \
                  --name aks-1 \
                  --subscription ${{ parameters.subscriptionId }} \
                  --file $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Setting up kubeconfig for cluster aks-2"
                az aks get-credentials \
                  --resource-group ${{ parameters.rgName }} \
                  --name aks-2 \
                  --subscription ${{ parameters.subscriptionId }} \
                  --file $(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Verifying cluster aks-1 connectivity"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig get nodes
                
                echo "==> Verifying cluster aks-2 connectivity"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig get nodes

          - task: PublishPipelineArtifact@1
            displayName: "Publish kubeconfig files"
            inputs:
              targetPath: $(Pipeline.Workspace)/kubeconfigs
              artifactName: kubeconfigs-${{ parameters.workloadType }}-${{ parameters.stageLabel }}
              publishLocation: pipeline

      - job: BuildMetricsBinary
        displayName: "Build Metrics Binary"
        steps:
          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"

          - task: Bash@3
            displayName: "Build persistent-cluster-metrics binary"
            inputs:
              targetType: 'inline'
              script: |
                make -C src/dnc persistent-cluster-metrics-binary
                chmod +x src/dnc/output/linux_amd64/metrics/persistent-cluster-metrics

          - task: PublishPipelineArtifact@1
            displayName: "Publish metrics binary and config"
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/src/dnc'
              artifact: 'persistent-cluster-metrics-${{ parameters.workloadType }}-${{ parameters.stageLabel }}'
              publishLocation: 'pipeline'

      - job: CreatePods
        displayName: "Create Swiftv2 Pods"
        dependsOn:
          - SetupKubeconfig
          - BuildMetricsBinary
        steps:
          - template: metrics-setup-steps.yaml
            parameters:
              workloadType: ${{ parameters.workloadType }}
              location: ${{ parameters.location }}
              stageLabel: ${{ parameters.stageLabel }}

          - task: AzureCLI@2
            name: RunCreatePods
            displayName: "Create pods"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Creating pods (8 scenarios) for workload type: ${{ parameters.workloadType }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                export WORKLOAD_TYPE="${{ parameters.workloadType }}"
                
                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"
                
                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster
                
                if go test -v -timeout=1h -tags=create_test; then
                  echo "CreatePods test PASSED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Pod creation" --region "${{ parameters.location }}"
                else
                  echo "CreatePods test FAILED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Pod creation" --region "${{ parameters.location }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: ConnectivityTests
        displayName: "Test Pod-to-Pod Connectivity"
        dependsOn: CreatePods
        steps:
          - template: metrics-setup-steps.yaml
            parameters:
              workloadType: ${{ parameters.workloadType }}
              location: ${{ parameters.location }}
              stageLabel: ${{ parameters.stageLabel }}

          - task: AzureCLI@2
            displayName: "Diagnose NSG and Cluster State"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set +e
                echo "========================================"
                echo "DIAGNOSTIC: Pre-Connectivity-Test State"
                echo "========================================"
                echo "Subscription: ${{ parameters.subscriptionId }}"
                echo "Resource Group: ${{ parameters.rgName }}"
                echo "Stage Label: ${{ parameters.stageLabel }}"
                echo "Workload Type: ${{ parameters.workloadType }}"
                echo "Location: ${{ parameters.location }}"
                echo ""

                az account set --subscription "${{ parameters.subscriptionId }}"

                echo "==> AKS cluster identity (proves subscription):"
                az aks show -g "${{ parameters.rgName }}" -n aks-1 \
                  --subscription "${{ parameters.subscriptionId }}" \
                  --query "{name:name, id:id, fqdn:fqdn}" -o table || echo "WARN: az aks show failed"
                echo ""

                echo "==> Kubeconfig cluster server URLs:"
                echo "  aks-1: $(kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null)"
                echo "  aks-2: $(kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null)"
                echo ""

                echo "==> NSG associations on cx_vnet_v1/s1 and cx_vnet_v1/s2:"
                NSG_S1=$(az network vnet subnet show -g "${{ parameters.rgName }}" --vnet-name cx_vnet_v1 -n s1 \
                  --subscription "${{ parameters.subscriptionId }}" --query "networkSecurityGroup.id" -o tsv 2>/dev/null)
                NSG_S2=$(az network vnet subnet show -g "${{ parameters.rgName }}" --vnet-name cx_vnet_v1 -n s2 \
                  --subscription "${{ parameters.subscriptionId }}" --query "networkSecurityGroup.id" -o tsv 2>/dev/null)
                echo "  s1 NSG: ${NSG_S1:-NONE}"
                echo "  s2 NSG: ${NSG_S2:-NONE}"
                echo ""

                if [ -n "$NSG_S1" ]; then
                  NSG_NAME=$(basename "$NSG_S1")
                  echo "==> NSG rules on $NSG_NAME (s1 NSG):"
                  az network nsg rule list -g "${{ parameters.rgName }}" --nsg-name "$NSG_NAME" \
                    --subscription "${{ parameters.subscriptionId }}" \
                    --query "[?contains(name, 'deny')]" -o table || echo "WARN: failed to list NSG rules"
                  echo ""
                fi

                if [ -n "$NSG_S2" ] && [ "$NSG_S2" != "$NSG_S1" ]; then
                  NSG_NAME2=$(basename "$NSG_S2")
                  echo "==> NSG rules on $NSG_NAME2 (s2 NSG, different from s1):"
                  az network nsg rule list -g "${{ parameters.rgName }}" --nsg-name "$NSG_NAME2" \
                    --subscription "${{ parameters.subscriptionId }}" \
                    --query "[?contains(name, 'deny')]" -o table || echo "WARN: failed to list NSG rules"
                  echo ""
                fi

                BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                NS_S1="pn-${BUILD_ID}-v1-s1"
                NS_S2="pn-${BUILD_ID}-v1-s2"
                SRC_POD="pod-c1-aks1-v1s1-low"
                DST_POD="pod-c1-aks1-v1s2-high"

                echo "==> Source pod eth1 IP ($NS_S1/$SRC_POD):"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  exec -n "$NS_S1" "$SRC_POD" -- ip addr show eth1 2>/dev/null || echo "WARN: could not exec into source pod"
                echo ""

                echo "==> Dest pod eth1 IP ($NS_S2/$DST_POD):"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  exec -n "$NS_S2" "$DST_POD" -- ip addr show eth1 2>/dev/null || echo "WARN: could not exec into dest pod"
                echo ""

                echo "==> Pods in NSG test namespaces:"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  get pods -n "$NS_S1" -o wide 2>/dev/null || echo "WARN: could not list pods in $NS_S1"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  get pods -n "$NS_S2" -o wide 2>/dev/null || echo "WARN: could not list pods in $NS_S2"
                echo ""
                echo "======== END DIAGNOSTIC ========"
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Ensure NSG Deny Rules (re-apply before test)"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Re-applying NSG deny rules immediately before connectivity tests"
                echo "    (NRMS DINE policy may have removed them since infra setup)"
                bash $(System.DefaultWorkingDirectory)/azure-container-networking/.pipelines/swiftv2-long-running/scripts/create_nsg.sh \
                  "${{ parameters.subscriptionId }}" \
                  "${{ parameters.rgName }}" \
                  "${{ parameters.location }}"
                echo "==> NSG deny rules applied. Verifying..."
                az account set --subscription "${{ parameters.subscriptionId }}"
                NSG_S1=$(az network vnet subnet show -g "${{ parameters.rgName }}" --vnet-name cx_vnet_v1 -n s1 \
                  --subscription "${{ parameters.subscriptionId }}" --query "networkSecurityGroup.id" -o tsv 2>/dev/null)
                if [ -n "$NSG_S1" ]; then
                  NSG_NAME=$(basename "$NSG_S1")
                  az network nsg rule list -g "${{ parameters.rgName }}" --nsg-name "$NSG_NAME" \
                    --subscription "${{ parameters.subscriptionId }}" \
                    --query "[?contains(name, 'deny')]" -o table
                fi

          - task: AzureCLI@2
            displayName: "Run Connectivity Tests"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running connectivity tests for workload type: ${{ parameters.workloadType }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                export WORKLOAD_TYPE="${{ parameters.workloadType }}"
                
                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"
                
                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster
                
                if go test -v -timeout=30m -tags=connectivity_test; then
                  echo "ConnectivityTests test PASSED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Connectivity tests" --region "${{ parameters.location }}"
                else
                  TEST_RC=1
                  echo "ConnectivityTests test FAILED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Connectivity tests" --region "${{ parameters.location }}"
                fi

                echo ""
                echo "======== POST-TEST NSG STATE ========"
                NSG_S1=$(az network vnet subnet show -g "${{ parameters.rgName }}" --vnet-name cx_vnet_v1 -n s1 \
                  --subscription "${{ parameters.subscriptionId }}" --query "networkSecurityGroup.id" -o tsv 2>/dev/null || true)
                echo "s1 NSG: ${NSG_S1:-NONE}"
                if [ -n "$NSG_S1" ]; then
                  NSG_NAME=$(basename "$NSG_S1")
                  echo "Deny rules on $NSG_NAME after test:"
                  az network nsg rule list -g "${{ parameters.rgName }}" --nsg-name "$NSG_NAME" \
                    --subscription "${{ parameters.subscriptionId }}" \
                    --query "[?contains(name, 'deny')]" -o table 2>/dev/null || true
                fi
                echo "======== END POST-TEST NSG STATE ========"

                exit ${TEST_RC:-0}
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: PrivateEndpointTests
        displayName: "Test Private Endpoint Access"
        dependsOn: ConnectivityTests
        steps:
          - template: metrics-setup-steps.yaml
            parameters:
              workloadType: ${{ parameters.workloadType }}
              location: ${{ parameters.location }}
              stageLabel: ${{ parameters.stageLabel }}

          - task: AzureCLI@2
            name: DiscoverStorageAccounts
            displayName: "Discover storage accounts"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Discovering storage accounts from resource group ${{ parameters.rgName }}..."
                STORAGE_ACCOUNT_1=$(az storage account list -g "${{ parameters.rgName }}" --subscription "${{ parameters.subscriptionId }}" --query "[?starts_with(name, 'sa1')].name | sort(@) | [0]" -o tsv)
                STORAGE_ACCOUNT_2=$(az storage account list -g "${{ parameters.rgName }}" --subscription "${{ parameters.subscriptionId }}" --query "[?starts_with(name, 'sa2')].name | sort(@) | [0]" -o tsv)
                echo "Discovered: STORAGE_ACCOUNT_1=$STORAGE_ACCOUNT_1, STORAGE_ACCOUNT_2=$STORAGE_ACCOUNT_2"
                
                SA1_COUNT=$(az storage account list -g "${{ parameters.rgName }}" --subscription "${{ parameters.subscriptionId }}" --query "[?starts_with(name, 'sa1')].name | length(@)" -o tsv)
                SA2_COUNT=$(az storage account list -g "${{ parameters.rgName }}" --subscription "${{ parameters.subscriptionId }}" --query "[?starts_with(name, 'sa2')].name | length(@)" -o tsv)
                if [ "$SA1_COUNT" -gt 1 ] || [ "$SA2_COUNT" -gt 1 ]; then
                  echo "##vso[task.logissue type=error]Ambiguous storage accounts: sa1 count=$SA1_COUNT, sa2 count=$SA2_COUNT in ${{ parameters.rgName }}"
                  exit 1
                fi
                
                if [ -z "$STORAGE_ACCOUNT_1" ] || [ -z "$STORAGE_ACCOUNT_2" ]; then
                  echo "##vso[task.logissue type=error]Could not discover storage accounts in ${{ parameters.rgName }}"
                  exit 1
                fi
                
                echo "##vso[task.setvariable variable=storageAccount1;isOutput=true]$STORAGE_ACCOUNT_1"
                echo "##vso[task.setvariable variable=storageAccount2;isOutput=true]$STORAGE_ACCOUNT_2"

          - task: AzureCLI@2
            displayName: "Run Private Endpoint Tests"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running Private Endpoint connectivity tests for workload type: ${{ parameters.workloadType }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                export WORKLOAD_TYPE="${{ parameters.workloadType }}"
                export STORAGE_ACCOUNT_1="$(DiscoverStorageAccounts.storageAccount1)"
                export STORAGE_ACCOUNT_2="$(DiscoverStorageAccounts.storageAccount2)"
                
                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"
                
                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster
                
                if go test -v -timeout=30m -tags=private_endpoint_test; then
                  echo "PrivateEndpointTests test PASSED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Private endpoint tests" --region "${{ parameters.location }}"
                else
                  echo "PrivateEndpointTests test FAILED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Private endpoint tests" --region "${{ parameters.location }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs
      
      - job: ScaleTest
        displayName: "Scale Tests - create and delete pods at scale"
        dependsOn: PrivateEndpointTests
        steps:
          - template: metrics-setup-steps.yaml
            parameters:
              workloadType: ${{ parameters.workloadType }}
              location: ${{ parameters.location }}
              stageLabel: ${{ parameters.stageLabel }}

          - task: AzureCLI@2
            displayName: "Run Scale Test (Create and Delete)"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running scale test for workload type: ${{ parameters.workloadType }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                echo "  - 10 pods in aks-1 (cx_vnet_v1/s1)"
                echo "  - 10 pods in aks-2 (cx_vnet_v3/s1)"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                export WORKLOAD_TYPE="${{ parameters.workloadType }}"
                
                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"
                
                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster
                
                if go test -v -timeout 1h -tags=scale_test; then
                  echo "ScaleTest test PASSED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Scale tests" --region "${{ parameters.location }}"
                else
                  echo "ScaleTest test FAILED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Scale tests" --region "${{ parameters.location }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: DeleteTestResources
        displayName: "Delete PodNetwork, PNI, and Pods"
        dependsOn: 
          - CreatePods
          - ConnectivityTests
          - PrivateEndpointTests
          - ScaleTest
        condition: always()
        steps:
          - template: metrics-setup-steps.yaml
            parameters:
              workloadType: ${{ parameters.workloadType }}
              location: ${{ parameters.location }}
              stageLabel: ${{ parameters.stageLabel }}

          - task: AzureCLI@2
            displayName: "Delete Test Resources"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Deleting test resources (8 scenarios) for workload type: ${{ parameters.workloadType }}"
                az account set --subscription "${{ parameters.subscriptionId }}"
                export RG="${{ parameters.rgName }}"
                export BUILD_ID="${{ parameters.rgName }}-${{ replace(parameters.workloadType, 'swiftv2-', '') }}"
                export WORKLOAD_TYPE="${{ parameters.workloadType }}"
                
                metrics_dir="$(System.DefaultWorkingDirectory)/Networking-Aquarius/src/dnc"
                ado_run_id="$(Build.BuildId)"
                
                cd $(System.DefaultWorkingDirectory)/azure-container-networking/test/integration/swiftv2/longRunningCluster
                
                if go test -v -timeout=1h -tags=delete_test; then
                  echo "DeleteTestResources test PASSED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsSucceeded" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Delete test resources" --region "${{ parameters.location }}"
                else
                  echo "DeleteTestResources test FAILED"
                  cd $metrics_dir
                  output/linux_amd64/metrics/persistent-cluster-metrics --metric-name "PersistentClusterTestsFailed" --ado-run-id $ado_run_id --resource-group "$RG" --cluster-type "${{ parameters.workloadType }}" --test-scenario "Delete test resources" --region "${{ parameters.location }}"
                  exit 1
                fi
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs
