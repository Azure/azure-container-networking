parameters:
  - name: subscriptionId
    type: string
  - name: location
    type: string
  - name: resourceGroupName
    type: string
  - name: runSetupStages
    type: boolean
    default: false


resources:
  repositories:
    - repository: Networking-Aquarius
      type: git
      name: One/Networking-Aquarius
      ref: refs/heads/master

variables:
  - name: rgName
    ${{ if eq(parameters.runSetupStages, true) }}:
      value: ${{ parameters.resourceGroupName }}
    ${{ else }}:
      value: sv2-long-run-${{ parameters.location }}
  - name: vmSkuDefault
    value: "Standard_D4s_v3"
  - name: vmSkuHighNIC
    value: "Standard_D16s_v3"

stages:
  - stage: AKSClusterAndNetworking
    displayName: "Stage: AKS Cluster and Networking Setup"
    condition: eq(${{ parameters.runSetupStages }}, true)
    jobs:
      - job: CreateResourceGroup
        displayName: "Create Resource Group"
        steps:
          - task: AzureCLI@2
            displayName: "Create resource group"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Creating resource group $(rgName) in ${{ parameters.location }}"
                az group create \
                  --name "$(rgName)" \
                  --location "${{ parameters.location }}" \
                  --subscription "${{ parameters.subscriptionId }}"
                echo "Resource group created successfully."

      - job: CreateCluster
        displayName: "Create AKS Clusters"
        dependsOn: CreateResourceGroup
        steps:
          - task: AzureCLI@2
            displayName: "Create AKS clusters"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_aks.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                $(vmSkuDefault)
                $(vmSkuHighNIC)
                $(DELEGATOR_CONTAINER_APP_NAME)
                $(DELEGATOR_RESOURCE_GROUP)
                $(DELEGATOR_SUBSCRIPTION)
      
      - job: NetworkingAndStorage
        displayName: "Networking and Storage Setup"
        dependsOn: CreateCluster
        steps:
          - task: AzureCLI@2
            displayName: "Create customer vnets"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_vnets.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                $(Build.BuildId)
                $(DELEGATOR_CONTAINER_APP_NAME)
                $(DELEGATOR_RESOURCE_GROUP)
                $(DELEGATOR_SUBSCRIPTION)

          - task: AzureCLI@2
            displayName: "Create customer vnet peerings"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_peerings.sh"
              arguments: >
                $(rgName)

          - task: AzureCLI@2
            name: CreateStorageAccounts
            displayName: "Create storage accounts"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_storage.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)

          - task: AzureCLI@2
            displayName: "Create Private Endpoint for Storage Account"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_pe.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                $(CreateStorageAccounts.StorageAccount1)
          
          - task: AzureCLI@2
            displayName: "Create network security groups to restrict access between subnets"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_nsg.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                $(rgName)
                ${{ parameters.location }}
      - job: PrintBicepFile
        displayName: "Print Linux BYON Bicep File"
        dependsOn: CreateCluster
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            displayName: "Checkout main repository"
          - checkout: Networking-Aquarius
            displayName: "Checkout Networking-Aquarius repository"
          # - task: Bash@3
          #   displayName: "Debug repository checkout"
          #   inputs:
          #     targetType: inline
          #     script: |
          #       echo "==> Debugging repository locations"
          #       echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
          #       echo "System.DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)"
          #       echo ""
          #       echo "==> Contents of Build.SourcesDirectory:"
          #       ls -la $(Build.SourcesDirectory)
          #       echo ""
          #       echo "==> Looking for Networking-Aquarius:"
          #       find $(Build.SourcesDirectory) -type d -name "Networking-Aquarius" || echo "Directory not found"
          #       echo ""
          #       echo "==> Searching for linux.bicep file:"
          #       find $(Build.SourcesDirectory) -name "linux.bicep" -type f || echo "File not found"
          - task: AzureCLI@2
            displayName: "Print linux.bicep file"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Displaying linux.bicep file from Networking-Aquarius repository"
                cat $(Build.SourcesDirectory)/Networking-Aquarius/.pipelines/singularity-runner/byon/linux.bicep
          - task: AzureCLI@2
            displayName: "Upload Kubeconfig to Key Vault and Deploy Linux VMSS"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                # Environment variables
                CLUSTER_KUBECONFIG_SECRET_NAME="${{ parameters.resourceGroupName }}-kubeconfig"
                
                echo "Fetching AKS credentials..."
                KUBECONFIG="./kubeconfig"
                az aks get-credentials \
                  --resource-group "${{ parameters.resourceGroupName }}" \
                  --name "aks-1" \
                  --file "$KUBECONFIG" \
                  --overwrite-existing
                
                echo "Storing kubeconfig in Azure Key Vault..."
                if [[ -f "$KUBECONFIG" ]]; then
                  az keyvault secret set \
                    --vault-name "$CLUSTER_KUBECONFIG_KEYVAULT_NAME" \
                    --name "$CLUSTER_KUBECONFIG_SECRET_NAME" \
                    --value "$(cat $KUBECONFIG)" \
                    --subscription "$KEY_VAULT_SUBSCRIPTION" \
                    >> /dev/null
                
                  if [[ $? -eq 0 ]]; then
                    echo "Successfully stored kubeconfig in Key Vault secret: $CLUSTER_KUBECONFIG_SECRET_NAME"
                  else
                    echo "##vso[task.logissue type=error]Failed to store kubeconfig in Key Vault"
                    exit 1
                  fi
                else
                  echo "##vso[task.logissue type=error]Kubeconfig file not found at: $KUBECONFIG"
                  exit 1
                fi
                
                echo "Fetching SSH public key from Key Vault..."
                ssh_public_key=$(az keyvault secret show \
                  --name "$SSH_PUBLIC_KEY_SECRET_NAME" \
                  --vault-name "$CLUSTER_KUBECONFIG_KEYVAULT_NAME" \
                  --subscription "$KEY_VAULT_SUBSCRIPTION" \
                  --query value -o tsv 2>/dev/null || echo "")
                
                if [[ -z "$ssh_public_key" ]]; then
                  echo "##vso[task.logissue type=error]Failed to retrieve SSH public key from Key Vault"
                  exit 1
                fi
                
                # Function to create and check VMSS
                create_and_check_vmss() {
                  local node_name=$1
                  local log_file="./lin-script-${node_name}.log"
                  local extension_name="NodeJoin-${node_name}"
                
                  echo "Creating Linux VMSS Node '${node_name}'"
                  az deployment group create -n "sat${node_name}" \
                    --resource-group "${{ parameters.resourceGroupName }}" \
                    --template-file $(Build.SourcesDirectory)/Networking-Aquarius/.pipelines/singularity-runner/byon/linux.bicep \
                    --parameters vnetname="aks-1" \
                                subnetname="nodenet" \
                                name="$node_name" \
                                sshPublicKey="$ssh_public_key" \
                                vnetrgname="${{ parameters.resourceGroupName }}" \
                                extensionName="$extension_name" \
                                clusterKubeconfigKeyvaultName="$CLUSTER_KUBECONFIG_KEYVAULT_NAME" \
                                clusterKubeconfigSecretName="$CLUSTER_KUBECONFIG_SECRET_NAME" \
                                keyVaultSubscription="$KEY_VAULT_SUBSCRIPTION" \
                                vmsssku="Standard_D16s_v3" \
                                delegatedNicsCount=7 \
                    >> "$log_file" 2>&1
                
                  echo "Displaying logs for node ${node_name}:"
                  cat "$log_file"
                
                  echo "Checking status for VMSS '${node_name}'"
                  local node_exists
                  node_exists=$(az vmss show --resource-group "${{ parameters.resourceGroupName }}" --name "$node_name" --query "name" -o tsv 2>/dev/null)
                  if [[ -z "$node_exists" ]]; then
                    echo "##vso[task.logissue type=error]VMSS '$node_name' does not exist. Sending failure metrics."
                    exit 1
                  else
                    echo "Successfully created VMSS: $node_name"
                  fi
                }
                
                create_and_check_vmss "linone"
                echo "VMSS deployment completed successfully."
  - stage: DataPathTests
    displayName: "Stage: Swiftv2 Data Path Tests on Linux Managed Nodes"
    dependsOn: AKSClusterAndNetworking
    condition: or(eq(${{ parameters.runSetupStages }}, false), succeeded())
    variables:
      storageAccount1: $[ stageDependencies.AKSClusterAndNetworking.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount1'] ]
      storageAccount2: $[ stageDependencies.AKSClusterAndNetworking.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount2'] ]
    jobs:
      - job: SetupKubeconfig
        displayName: "Setup Kubeconfig Files"
        steps:
          - task: AzureCLI@2
            displayName: "Generate and verify kubeconfig files"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                mkdir -p $(Pipeline.Workspace)/kubeconfigs
                
                echo "==> Setting up kubeconfig for cluster aks-1"
                az aks get-credentials \
                  --resource-group $(rgName) \
                  --name aks-1 \
                  --file $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Setting up kubeconfig for cluster aks-2"
                az aks get-credentials \
                  --resource-group $(rgName) \
                  --name aks-2 \
                  --file $(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Verifying cluster aks-1 connectivity"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig get nodes
                
                echo "==> Verifying cluster aks-2 connectivity"
                kubectl --kubeconfig $(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig get nodes

          - task: PublishPipelineArtifact@1
            displayName: "Publish kubeconfig files"
            inputs:
              targetPath: $(Pipeline.Workspace)/kubeconfigs
              artifactName: kubeconfigs
              publishLocation: pipeline

      - job: CreatePods
        displayName: "Create Swiftv2 Pods"
        dependsOn: SetupKubeconfig
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Create pods"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Creating pods (8 scenarios)"
                export RG="$(rgName)"
                export BUILD_ID="$(rgName)"
                export WORKLOAD_TYPE="swiftv2-linux"
                cd ./test/integration/swiftv2/longRunningCluster
                go test -v -timeout=1h -tags=create_test
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: ConnectivityTests
        displayName: "Test Pod-to-Pod Connectivity"
        dependsOn: CreatePods
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Run Connectivity Tests"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running connectivity tests"
                export RG="$(rgName)"
                export BUILD_ID="$(rgName)"
                export WORKLOAD_TYPE="swiftv2-linux"
                cd ./test/integration/swiftv2/longRunningCluster
                go test -v -timeout=30m -tags=connectivity_test
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: PrivateEndpointTests
        displayName: "Test Private Endpoint Access"
        dependsOn: ConnectivityTests
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            name: DiscoverStorageAccounts
            displayName: "Discover storage accounts"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                STORAGE_ACCOUNT_1="$(storageAccount1)"
                STORAGE_ACCOUNT_2="$(storageAccount2)"
                
                if [ -z "$STORAGE_ACCOUNT_1" ] || [ -z "$STORAGE_ACCOUNT_2" ]; then
                  echo "Storage account variables not set, discovering from resource group..."
                  STORAGE_ACCOUNT_1=$(az storage account list -g $(rgName) --query "[?starts_with(name, 'sa1')].name" -o tsv)
                  STORAGE_ACCOUNT_2=$(az storage account list -g $(rgName) --query "[?starts_with(name, 'sa2')].name" -o tsv)
                  echo "Discovered: STORAGE_ACCOUNT_1=$STORAGE_ACCOUNT_1, STORAGE_ACCOUNT_2=$STORAGE_ACCOUNT_2"
                fi
                
                echo "##vso[task.setvariable variable=storageAccount1;isOutput=true]$STORAGE_ACCOUNT_1"
                echo "##vso[task.setvariable variable=storageAccount2;isOutput=true]$STORAGE_ACCOUNT_2"

          - task: AzureCLI@2
            displayName: "Assign RBAC for SAS token generation"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/manage_storage_rbac.sh"
              arguments: >
                assign
                ${{ parameters.subscriptionId }}
                $(rgName)
                "$(DiscoverStorageAccounts.storageAccount1)"

          - task: AzureCLI@2
            displayName: "Run Private Endpoint Tests"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running Private Endpoint connectivity tests"
                export RG="$(rgName)"
                export BUILD_ID="$(rgName)"
                export WORKLOAD_TYPE="swiftv2-linux"
                export STORAGE_ACCOUNT_1="$(DiscoverStorageAccounts.storageAccount1)"
                export STORAGE_ACCOUNT_2="$(DiscoverStorageAccounts.storageAccount2)"
                cd ./test/integration/swiftv2/longRunningCluster
                go test -v -timeout=30m -tags=private_endpoint_test
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Remove RBAC after tests"
            condition: always()
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/manage_storage_rbac.sh"
              arguments: >
                delete
                ${{ parameters.subscriptionId }}
                $(rgName)
                "$(DiscoverStorageAccounts.storageAccount1) $(DiscoverStorageAccounts.storageAccount2)"
      
      - job: ScaleTest
        displayName: "Scale Tests - create and delete pods at scale."
        dependsOn: 
          - PrivateEndpointTests
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Run Scale Test (Create and Delete)"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Running scale test: Create 20 pods with device plugin across both clusters"
                echo "  - 10 pods in aks-1 (cx_vnet_v1/s1)"
                echo "  - 10 pods in aks-2 (cx_vnet_v3/s1)"
                export RG="$(rgName)"
                export BUILD_ID="$(rgName)"
                export WORKLOAD_TYPE="swiftv2-linux"
                cd ./test/integration/swiftv2/longRunningCluster
                go test -v -timeout 1h -tags=scale_test
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs

      - job: DeleteTestResources
        displayName: "Delete PodNetwork, PNI, and Pods"
        dependsOn: 
          - CreatePods
          - ConnectivityTests
          - PrivateEndpointTests
          - ScaleTest
        condition: always()
        steps:
          - task: DownloadPipelineArtifact@2
            displayName: "Download kubeconfig files"
            inputs:
              artifactName: kubeconfigs
              targetPath: $(Pipeline.Workspace)/kubeconfigs

          - task: AzureCLI@2
            displayName: "Delete Test Resources"
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Deleting test resources (8 scenarios)"
                export RG="$(rgName)"
                export BUILD_ID="$(rgName)"
                export WORKLOAD_TYPE="swiftv2-linux"
                cd ./test/integration/swiftv2/longRunningCluster
                go test -v -timeout=1h -tags=delete_test
              workingDirectory: $(System.DefaultWorkingDirectory)
            env:
              KUBECONFIG: $(Pipeline.Workspace)/kubeconfigs/aks-1.kubeconfig:$(Pipeline.Workspace)/kubeconfigs/aks-2.kubeconfig
              KUBECONFIG_DIR: $(Pipeline.Workspace)/kubeconfigs
              