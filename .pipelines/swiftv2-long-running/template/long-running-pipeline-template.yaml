parameters:
  - name: scenarios
    type: object
  - name: resourceGroupName
    type: string
  - name: workloadType
    type: object
    default: [ "swiftv2-linux", "swiftv2-linux-byon", "swiftv2-l1vh-accelnet-byon" ] #"swiftv2-l1vh-infiniband-byon"
    displayName: "Swiftv2 scenarios to run"


resources:
  repositories:
    - repository: Networking-Aquarius
      type: git
      name: One/Networking-Aquarius
      ref: refs/heads/master

variables:
  - name: vmSkuDefault
    value: "Standard_D4s_v3"
  - name: vmSkuHighNIC
    value: "Standard_D16s_v3"
  - name: isAllowedRun
    value: ${{ ne(variables['Build.Reason'], 'IndividualCI') }}

stages:
  # ============================================================
  # Infrastructure verify & setup for each scenario (idempotent)
  # ============================================================
  - ${{ each scenario in parameters.scenarios }}:
    - template: infrastructure-setup-stage.yaml
      parameters:
        subscriptionId: ${{ scenario.subscriptionId }}
        location: ${{ scenario.location }}
        stageLabel: ${{ scenario.label }}
        resourceGroupName: ${{ parameters.resourceGroupName }}
        vmSkuDefault: $(vmSkuDefault)
        vmSkuHighNIC: $(vmSkuHighNIC)
        enableAccelnetBYON: ${{ scenario.enableAccelnet }}
        enableLinuxBYON: ${{ scenario.enableLinuxBYON }}
        dependsOn: []

  # ============================================================
  # Long-running pod tests per zone (rotating + DaemonSet + connectivity)
  # Each zone independently ensures its own node pool exists.
  # ============================================================
  - ${{ each scenario in parameters.scenarios }}:
    - ${{ each zone in scenario.longRunningPodZones }}:
      - template: long-running-pod-tests-stage.yaml
        parameters:
          location: ${{ scenario.location }}
          subscriptionId: ${{ scenario.subscriptionId }}
          stageLabel: ${{ scenario.label }}
          rgName: ${{ parameters.resourceGroupName }}-${{ scenario.location }}
          zone: ${{ zone }}
          vmSkuHighNIC: $(vmSkuHighNIC)
          dependsOn:
            - AKSClusterAndNetworking_${{ replace(scenario.label, '-', '_') }}

  # ============================================================
  # Acquire pipeline lease (prevents concurrent runs colliding)
  # ============================================================
  - ${{ each scenario in parameters.scenarios }}:
    - stage: AcquireLease_${{ replace(scenario.label, '-', '_') }}
      displayName: "Acquire Pipeline Lease (${{ scenario.label }})"
      dependsOn:
        - AKSClusterAndNetworking_${{ replace(scenario.label, '-', '_') }}
      condition: and(eq(variables.isAllowedRun, true), not(failed()))
      jobs:
        - job: AcquireLease
          displayName: "Acquire ConfigMap lease on aks-1"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              name: AcquireLeaseStep
              displayName: "Get kubeconfig and acquire lease"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az aks get-credentials \
                    -g "${{ parameters.resourceGroupName }}-${{ scenario.location }}" \
                    -n aks-1 --admin --overwrite-existing \
                    --subscription "${{ scenario.subscriptionId }}" \
                    --file /tmp/aks-1.kubeconfig

                  set +e
                  bash .pipelines/swiftv2-long-running/scripts/acquire_pipeline_lease.sh \
                    /tmp/aks-1.kubeconfig \
                    "$(Build.BuildId)" \
                    300
                  ACQUIRE_RC=$?
                  set -e

                  if [ "$ACQUIRE_RC" -eq 0 ]; then
                    echo "Lease acquired for this run."
                    echo "##vso[task.setvariable variable=leaseAcquired;isOutput=true]true"
                  elif [ "$ACQUIRE_RC" -eq 2 ]; then
                    echo "Lease is currently held by another run. Lease-gated stages will be skipped."
                    echo "##vso[task.setvariable variable=leaseAcquired;isOutput=true]false"
                    exit 0
                  else
                    echo "ERROR: Lease acquisition failed unexpectedly with code $ACQUIRE_RC"
                    exit "$ACQUIRE_RC"
                  fi

  # ============================================================
  # Datapath tests for each scenario and workload type
  # ============================================================
  - ${{ each scenario in parameters.scenarios }}:
    - ${{ each workload in parameters.workloadType }}:
      # Skip accelnet workloads unless the scenario has accelnet enabled.
      # Skip linux-byon workloads unless the scenario has linux BYON enabled.
      - ${{ if and(or(not(contains(workload, 'l1vh-accelnet')), scenario.enableAccelnet), or(not(eq(workload, 'swiftv2-linux-byon')), scenario.enableLinuxBYON)) }}:
        - template: datapath-tests-stage.yaml
          parameters:
            workloadType: ${{ workload }}
            location: ${{ scenario.location }}
            subscriptionId: ${{ scenario.subscriptionId }}
            stageLabel: ${{ scenario.label }}
            rgName: ${{ parameters.resourceGroupName }}-${{ scenario.location }}
            leaseAcquired: $[ dependencies.AcquireLease_${{ replace(scenario.label, '-', '_') }}.outputs['AcquireLease.AcquireLeaseStep.leaseAcquired'] ]
            ${{ if eq(workload, 'swiftv2-linux') }}:
              dependsOn: 
                - AKSClusterAndNetworking_${{ replace(scenario.label, '-', '_') }}
                - AcquireLease_${{ replace(scenario.label, '-', '_') }}
            ${{ if eq(workload, 'swiftv2-linux-byon') }}:
              dependsOn: 
                - AKSClusterAndNetworking_${{ replace(scenario.label, '-', '_') }}
                - AcquireLease_${{ replace(scenario.label, '-', '_') }}
                - DataPathTests_swiftv2_linux_${{ replace(scenario.label, '-', '_') }}
            ${{ if eq(workload, 'swiftv2-l1vh-accelnet-byon') }}:
              dependsOn: 
                - AKSClusterAndNetworking_${{ replace(scenario.label, '-', '_') }}
                - AcquireLease_${{ replace(scenario.label, '-', '_') }}
                - DataPathTests_swiftv2_linux_byon_${{ replace(scenario.label, '-', '_') }}

  # ============================================================
  # Release pipeline lease (always runs, even on failure)
  # ============================================================
  - ${{ each scenario in parameters.scenarios }}:
    - stage: ReleaseLease_${{ replace(scenario.label, '-', '_') }}
      displayName: "Release Pipeline Lease (${{ scenario.label }})"
      ${{ if and(scenario.enableAccelnet, scenario.enableLinuxBYON) }}:
        dependsOn:
          - AcquireLease_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_byon_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_l1vh_accelnet_byon_${{ replace(scenario.label, '-', '_') }}
      ${{ elseif and(not(scenario.enableAccelnet), scenario.enableLinuxBYON) }}:
        dependsOn:
          - AcquireLease_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_byon_${{ replace(scenario.label, '-', '_') }}
      ${{ elseif and(scenario.enableAccelnet, not(scenario.enableLinuxBYON)) }}:
        dependsOn:
          - AcquireLease_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_l1vh_accelnet_byon_${{ replace(scenario.label, '-', '_') }}
      ${{ else }}:
        dependsOn:
          - AcquireLease_${{ replace(scenario.label, '-', '_') }}
          - DataPathTests_swiftv2_linux_${{ replace(scenario.label, '-', '_') }}
      condition: and(always(), eq(dependencies.AcquireLease_${{ replace(scenario.label, '-', '_') }}.outputs['AcquireLease.AcquireLeaseStep.leaseAcquired'], 'true'))
      jobs:
        - job: ReleaseLease
          displayName: "Release ConfigMap lease on aks-1"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Release lease"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az aks get-credentials \
                    -g "${{ parameters.resourceGroupName }}-${{ scenario.location }}" \
                    -n aks-1 --admin --overwrite-existing \
                    --subscription "${{ scenario.subscriptionId }}" \
                    --file /tmp/aks-1.kubeconfig

                  bash .pipelines/swiftv2-long-running/scripts/release_pipeline_lease.sh \
                    /tmp/aks-1.kubeconfig \
                    "$(Build.BuildId)"
