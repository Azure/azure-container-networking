parameters:
  - name: subscriptionId
    type: string
  - name: location
    type: object
  - name: resourceGroupName
    type: string
  - name: hourlyRegions
    type: object
    default: []
  - name: workloadType
    type: object
    default: [ "swiftv2-linux", "swiftv2-linux-byon", "swiftv2-l1vh-accelnet-byon" ] #"swiftv2-l1vh-infiniband-byon"
    displayName: "Swiftv2 scenarios to run"


resources:
  repositories:
    - repository: Networking-Aquarius
      type: git
      name: One/Networking-Aquarius
      ref: refs/heads/master

variables:
  - name: vmSkuDefault
    value: "Standard_D4s_v3"
  - name: vmSkuHighNIC
    value: "Standard_D16s_v3"
  - name: isAllowedRun
    value: ${{ ne(variables['Build.Reason'], 'IndividualCI') }}

stages:
  # ============================================================
  # Infrastructure verify & setup for each location (idempotent)
  # ============================================================
  - ${{ each loc in parameters.location }}:
    - stage: AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}
      displayName: "Stage: Verify & Setup Infrastructure (${{ loc }})"
      condition: eq(variables.isAllowedRun, true)
      variables:
        rgName: ${{ parameters.resourceGroupName }}-${{ loc }}
      jobs:
        # First: smart verification of existing infrastructure
        - job: VerifyInfrastructure
          displayName: "Verify Infrastructure Exists"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              name: InfraCheck
              displayName: "Smart infrastructure verification"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/verify_infrastructure.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  $(rgName)

        # Only run setup jobs if infrastructure is missing
        - job: CreateResourceGroup
          displayName: "Create Resource Group"
          dependsOn: VerifyInfrastructure
          condition: and(succeeded(), eq(dependencies.VerifyInfrastructure.outputs['InfraCheck.infraExists'], 'false'))
          steps:
            - task: AzureCLI@2
              displayName: "Create resource group"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  echo "==> Creating resource group $(rgName) in ${{ loc }}"
                  az group create \
                    --name "$(rgName)" \
                    --location "${{ loc }}" \
                    --subscription "${{ parameters.subscriptionId }}"
                  echo "Resource group created successfully."

        - job: CreateCluster
          displayName: "Create AKS Clusters"
          dependsOn:
            - VerifyInfrastructure
            - CreateResourceGroup
          condition: and(not(failed()), eq(dependencies.VerifyInfrastructure.outputs['InfraCheck.infraExists'], 'false'))
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Create AKS clusters"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_aks.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  ${{ loc }}
                  $(rgName)
                  $(vmSkuDefault)
                  $(vmSkuHighNIC)
                  $(DELEGATOR_CONTAINER_APP_NAME)
                  $(DELEGATOR_RESOURCE_GROUP)
                  $(DELEGATOR_SUBSCRIPTION)
        
        - job: NetworkingAndStorage
          displayName: "Networking and Storage Setup"
          dependsOn:
            - VerifyInfrastructure
            - CreateCluster
          condition: and(not(failed()), eq(dependencies.VerifyInfrastructure.outputs['InfraCheck.infraExists'], 'false'))
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Create customer vnets"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_vnets.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  ${{ loc }}
                  $(rgName)
                  $(Build.BuildId)
                  $(DELEGATOR_CONTAINER_APP_NAME)
                  $(DELEGATOR_RESOURCE_GROUP)
                  $(DELEGATOR_SUBSCRIPTION)

            - task: AzureCLI@2
              displayName: "Create customer vnet peerings"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_peerings.sh"
                arguments: >
                  $(rgName)

            - task: AzureCLI@2
              name: CreateStorageAccounts
              displayName: "Create storage accounts"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_storage.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  ${{ loc }}
                  $(rgName)

            - task: AzureCLI@2
              displayName: "Create Private Endpoint for Storage Account"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_pe.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  ${{ loc }}
                  $(rgName)
                  $(CreateStorageAccounts.StorageAccount1)
            
            - task: AzureCLI@2
              displayName: "Create network security groups to restrict access between subnets"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/create_nsg.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  $(rgName)
                  ${{ loc }}

        - job: DeployLinuxBYON
          displayName: "Join Linux BYON VMSS to AKS Cluster"
          dependsOn:
            - VerifyInfrastructure
            - CreateCluster
            - NetworkingAndStorage
          condition: and(not(failed()), eq(dependencies.VerifyInfrastructure.outputs['InfraCheck.infraExists'], 'false'))
          pool:
            vmImage: ubuntu-latest
          steps:
            - checkout: self
              displayName: "Checkout main repository"
            - checkout: Networking-Aquarius
              displayName: "Checkout Networking-Aquarius repository"
            - task: AzureCLI@2
              displayName: "Deploy Linux VMSS"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: "$(Build.SourcesDirectory)/azure-container-networking/.pipelines/swiftv2-long-running/scripts/deploy_linuxbyon.sh"
                arguments: >
                  $(rgName)
                  $(Build.SourcesDirectory)
              env:
                SSH_PUBLIC_KEY_SECRET_NAME: $(SSH_PUBLIC_KEY_SECRET_NAME)
                CLUSTER_KUBECONFIG_KEYVAULT_NAME: $(CLUSTER_KUBECONFIG_KEYVAULT_NAME)
                KEY_VAULT_RESOURCE_GROUP: $(KEY_VAULT_RESOURCE_GROUP)
                KEY_VAULT_SUBSCRIPTION: $(KEY_VAULT_SUBSCRIPTION)

  # Deploy Accelnet BYON nodes - currently only enabled in centraluseuap (expand to other regions when quota is available)
  - ${{ each loc in parameters.location }}:
    - ${{ if eq(loc, 'centraluseuap') }}:
      - stage: DeployAccelnetBYON_${{ replace(loc, '-', '_') }}
        displayName: "Deploy Accelnet BYO nodes to AKS cluster (${{ loc }})"
        dependsOn: AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}
        condition: and(eq(variables.isAllowedRun, true), or(eq(${{ parameters.runSetupStages }}, false), succeeded()))
        variables:
          ${{ if eq(parameters.runSetupStages, true) }}:
            rgName: ${{ parameters.resourceGroupName }}-${{ loc }}
          ${{ else }}:
            rgName: sv2-long-run-${{ loc }}
        jobs: 
          - job: JoinAccelnetBYONtoAKS
            displayName: "Join Accelnet BYON VMSS to AKS Cluster"
            timeoutInMinutes: 480
            pool:
              vmImage: ubuntu-latest
            steps:
              - checkout: self
                displayName: "Checkout main repository"
              - checkout: Networking-Aquarius
                displayName: "Checkout Networking-Aquarius repository"
              - task: AzureCLI@2
                displayName: "Deploy Accelnet VMSS"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: scriptPath
                  scriptPath: "$(Build.SourcesDirectory)/azure-container-networking/.pipelines/swiftv2-long-running/scripts/deploy_accelnetbyon.sh"
                  arguments: >
                    $(rgName)
                    ${{ loc }}
                    $(Build.SourcesDirectory)
                env:
                  SSH_PUBLIC_KEY_SECRET_NAME: $(SSH_PUBLIC_KEY_SECRET_NAME)
                  CLUSTER_KUBECONFIG_KEYVAULT_NAME: $(CLUSTER_KUBECONFIG_KEYVAULT_NAME)
                  KEY_VAULT_RESOURCE_GROUP: $(KEY_VAULT_RESOURCE_GROUP)
                  KEY_VAULT_SUBSCRIPTION: $(KEY_VAULT_SUBSCRIPTION)
                  L1VH_KEYVAULT_NAME: $(L1VH_KEYVAULT_NAME)
                  L1VH_VMSS_PASSWORD_SECRET: $(L1VH_VMSS_PASSWORD_SECRET)
                  L1VH_VM_BICEP_PASSWORD_SECRET: $(L1VH_VM_BICEP_PASSWORD_SECRET)
                  L1VH_STORAGE_SECRET: $(L1VH_STORAGE_SECRET)

  # ============================================================
  # Zone node pool setup for long-running tests (idempotent, always runs)
  # ============================================================
  - ${{ each region in parameters.hourlyRegions }}:
    - stage: EnsureZoneNodePools_${{ replace(region.location, '-', '_') }}
      displayName: "Setup: Zone Node Pools (${{ region.location }})"
      dependsOn:
        - AKSClusterAndNetworking_${{ replace(region.location, '-', '_') }}
      condition: and(eq(variables.isAllowedRun, true), not(failed()))
      jobs:
        - job: EnsureNodePools
          displayName: "Create zone node pools if missing"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Ensure per-zone high-NIC node pools"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: scriptPath
                scriptPath: ".pipelines/swiftv2-long-running/scripts/ensure_zone_nodepools.sh"
                arguments: >
                  ${{ parameters.subscriptionId }}
                  ${{ parameters.resourceGroupName }}-${{ region.location }}
                  aks-1
                  $(vmSkuHighNIC)
                  "${{ join(' ', region.zones) }}"
                  7

  # ============================================================
  # Acquire pipeline lease (prevents concurrent runs colliding)
  # ============================================================
  - ${{ each loc in parameters.location }}:
    - stage: AcquireLease_${{ replace(loc, '-', '_') }}
      displayName: "Acquire Pipeline Lease (${{ loc }})"
      dependsOn:
        - AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}
      condition: and(eq(variables.isAllowedRun, true), not(failed()))
      jobs:
        - job: AcquireLease
          displayName: "Acquire ConfigMap lease on aks-1"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Get kubeconfig and acquire lease"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az aks get-credentials \
                    -g "${{ parameters.resourceGroupName }}-${{ loc }}" \
                    -n aks-1 --admin --overwrite-existing \
                    --file /tmp/aks-1.kubeconfig

                  bash .pipelines/swiftv2-long-running/scripts/acquire_pipeline_lease.sh \
                    /tmp/aks-1.kubeconfig \
                    "$(Build.BuildId)" \
                    30 \
                    120

  # ============================================================
  # Datapath tests for each location and workload type
  # ============================================================
  - ${{ each loc in parameters.location }}:
    - ${{ each workload in parameters.workloadType }}:
      # Skip accelnet workloads in regions where accelnet is not enabled (currently only centraluseuap has quota)
      - ${{ if or(not(contains(workload, 'l1vh-accelnet')), eq(loc, 'centraluseuap')) }}:
        - template: datapath-tests-stage.yaml
          parameters:
            workloadType: ${{ workload }}
            location: ${{ loc }}
            subscriptionId: ${{ parameters.subscriptionId }}
            ${{ if eq(parameters.runSetupStages, true) }}:
              rgName: ${{ parameters.resourceGroupName }}-${{ loc }}
            ${{ else }}:
              rgName: sv2-long-run-${{ loc }}
            storageAccount1: $[ stageDependencies.AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount1'] ]
            storageAccount2: $[ stageDependencies.AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount2'] ]
            runSetupStages: ${{ parameters.runSetupStages }}
            ${{ if eq(workload, 'swiftv2-linux') }}:
              dependsOn: 
                - AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}
                - AcquireLease_${{ replace(loc, '-', '_') }}
            ${{ if eq(workload, 'swiftv2-linux-byon') }}:
              dependsOn: 
                - AKSClusterAndNetworking_${{ replace(loc, '-', '_') }}
                - AcquireLease_${{ replace(loc, '-', '_') }}
                - DataPathTests_swiftv2_linux_${{ replace(loc, '-', '_') }}
            ${{ if eq(workload, 'swiftv2-l1vh-accelnet-byon') }}:
              dependsOn: 
                - DeployAccelnetBYON_${{ replace(loc, '-', '_') }}
                - AcquireLease_${{ replace(loc, '-', '_') }}
                - DataPathTests_swiftv2_linux_byon_${{ replace(loc, '-', '_') }}

  # ============================================================
  # Long-running pod tests per zone (rotating + DaemonSet + connectivity)
  # ============================================================
  - ${{ each region in parameters.hourlyRegions }}:
    - ${{ each zone in region.zones }}:
      - template: hourly-pod-tests-stage.yaml
        parameters:
          location: ${{ region.location }}
          subscriptionId: ${{ parameters.subscriptionId }}
          rgName: ${{ parameters.resourceGroupName }}-${{ region.location }}
          zone: ${{ zone }}
          dependsOn:
            - EnsureZoneNodePools_${{ replace(region.location, '-', '_') }}

  # ============================================================
  # Release pipeline lease (always runs, even on failure)
  # ============================================================
  - ${{ each loc in parameters.location }}:
    - stage: ReleaseLease_${{ replace(loc, '-', '_') }}
      displayName: "Release Pipeline Lease (${{ loc }})"
      dependsOn:
        - AcquireLease_${{ replace(loc, '-', '_') }}
        - ${{ each workload in parameters.workloadType }}:
          - ${{ if or(not(contains(workload, 'l1vh-accelnet')), eq(loc, 'centraluseuap')) }}:
            - DataPathTests_${{ replace(workload, '-', '_') }}_${{ replace(loc, '-', '_') }}
      condition: always()
      jobs:
        - job: ReleaseLease
          displayName: "Release ConfigMap lease on aks-1"
          steps:
            - checkout: self
              displayName: "Checkout azure-container-networking"
            - task: AzureCLI@2
              displayName: "Release lease"
              inputs:
                azureSubscription: $(AZURE_SERVICE_CONNECTION)
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  az aks get-credentials \
                    -g "${{ parameters.resourceGroupName }}-${{ loc }}" \
                    -n aks-1 --admin --overwrite-existing \
                    --file /tmp/aks-1.kubeconfig

                  bash .pipelines/swiftv2-long-running/scripts/release_pipeline_lease.sh \
                    /tmp/aks-1.kubeconfig \
                    "$(Build.BuildId)"
