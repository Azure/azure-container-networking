parameters:
  - name: subscriptionId
    type: string
  - name: location
    type: string
  - name: resourceGroupName
    type: string
  - name: vmSkuDefault
    type: string
  - name: vmSkuHighNIC
    type: string
  - name: serviceConnection
    type: string
  - name: runSetupStages
    type: boolean
    default: false

variables:
  - name: rgName
    ${{ if eq(parameters.runSetupStages, true) }}:
      value: ${{ parameters.resourceGroupName }}
    ${{ else }}:
      value: sv2-long-run-${{ parameters.location }}

stages:
  # =================================================================
  # Stage 1: AKS Cluster and Networking Setup (Conditional)
  # =================================================================
  - stage: AKSClusterAndNetworking
    displayName: "Stage: AKS Cluster and Networking Setup"
    condition: eq(${{ parameters.runSetupStages }}, true)
    jobs:
      # ------------------------------------------------------------
      # Job 1: Create Resource Group
      # ------------------------------------------------------------
      - job: CreateResourceGroup
        displayName: "Create Resource Group"
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: "Create resource group"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Org: $SYSTEM_COLLECTIONURI"
                echo "Project: $SYSTEM_TEAMPROJECT"
                echo "==> Creating resource group $(rgName) in ${{ parameters.location }}"
                az group create \
                  --name "$(rgName)" \
                  --location "${{ parameters.location }}" \
                  --tags SkipAutoDeleteTill=2032-12-31 \
                  --subscription "${{ parameters.subscriptionId }}"
                echo "Resource group created successfully."

      # ------------------------------------------------------------
      # Job 2: Create AKS Clusters
      # ------------------------------------------------------------
      - job: CreateCluster
        displayName: "Create AKS Clusters"
        dependsOn: CreateResourceGroup
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: "Run create_aks.sh"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_aks.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                ${{ parameters.vmSkuDefault }}
                ${{ parameters.vmSkuHighNIC }}
      
      # ------------------------------------------------------------
      # Job 3: Networking & Storage
      # ------------------------------------------------------------
      - job: NetworkingAndStorage
        timeoutInMinutes: 0
        displayName: "Networking and Storage Setup"
        dependsOn: CreateResourceGroup
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          # Task 1: Create VNets
          - task: AzureCLI@2
            displayName: "Create customer vnets"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_vnets.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                $(Build.BuildId)

          # Task 2: Create Peerings
          - task: AzureCLI@2
            displayName: "Create customer vnet peerings"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_peerings.sh"
              arguments: >
                $(rgName)

          # Task 3: Create Storage Accounts
          - task: AzureCLI@2
            name: CreateStorageAccounts
            displayName: "Create storage accounts"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_storage.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)

          # Task 4: Create NSG
          - task: AzureCLI@2
            displayName: "Create network security groups to restrict access between subnets"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_nsg.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                $(rgName)
                ${{ parameters.location }}

          # Task 5: Create Private Endpoint
          - task: AzureCLI@2
            displayName: "Create Private Endpoint for Storage Account"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: ".pipelines/swiftv2-long-running/scripts/create_pe.sh"
              arguments: >
                ${{ parameters.subscriptionId }}
                ${{ parameters.location }}
                $(rgName)
                $(CreateStorageAccounts.StorageAccount1)
  # =================================================================
  # Stage 2: Datapath Tests
  # =================================================================
  - stage: DataPathTests
    displayName: "Stage: Swiftv2 Data Path Tests"
    dependsOn: AKSClusterAndNetworking
    condition: or(eq(${{ parameters.runSetupStages }}, false), succeeded())

    variables:
      storageAccount1: $[ stageDependencies.AKSClusterAndNetworking.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount1'] ]
      storageAccount2: $[ stageDependencies.AKSClusterAndNetworking.NetworkingAndStorage.outputs['CreateStorageAccounts.StorageAccount2'] ]
    jobs:
      # ------------------------------------------------------------
      # Job: Run Datapath Lifecycle Tests
      # ------------------------------------------------------------
      - job: DatapathLifecycleTests
        displayName: "Run Datapath Lifecycle Tests"
        timeoutInMinutes: 120
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: GoTool@0
            displayName: "Use Go 1.22.5"
            inputs:
              version: "1.22.5"
              
          - task: AzureCLI@2
            displayName: "Create Test Resources"
            inputs:
              azureSubscription: ${{ parameters.serviceConnection }}
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "==> Installing Ginkgo CLI"
                go install github.com/onsi/ginkgo/v2/ginkgo@latest
                
                echo "==> Adding Go bin to PATH"
                export PATH=$PATH:$(go env GOPATH)/bin

                echo "==> Downloading Go dependencies"
                go mod download
                
                echo "==> Setting up kubeconfig for cluster aks-1"
                az aks get-credentials \
                  --resource-group $(rgName) \
                  --name aks-1 \
                  --file /tmp/aks-1.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Setting up kubeconfig for cluster aks-2"
                az aks get-credentials \
                  --resource-group $(rgName) \
                  --name aks-2 \
                  --file /tmp/aks-2.kubeconfig \
                  --overwrite-existing \
                  --admin
                
                echo "==> Verifying cluster aks-1 connectivity"
                kubectl --kubeconfig /tmp/aks-1.kubeconfig get nodes
                
                echo "==> Verifying cluster aks-2 connectivity"
                kubectl --kubeconfig /tmp/aks-2.kubeconfig get nodes
                
                echo "==> Ensuring nic-capacity labels are present on all nodes"
                for cluster in aks-1 aks-2; do
                  echo "Checking $cluster node labels..."
                  # Get default pool nodes (low-nic capacity)
                  DEFAULT_NODES=$(kubectl --kubeconfig /tmp/$cluster.kubeconfig get nodes -o json | jq -r '.items[] | select(.metadata.labels["agentpool"] == "nodepool1") | .metadata.name')
                  for node in $DEFAULT_NODES; do
                    echo "Labeling node $node as low-nic"
                    kubectl --kubeconfig /tmp/$cluster.kubeconfig label node "$node" nic-capacity=low-nic --overwrite || echo "Warning: Failed to label $node"
                  done
                  
                  # Get nplinux pool nodes (high-nic capacity)
                  NPLINUX_NODES=$(kubectl --kubeconfig /tmp/$cluster.kubeconfig get nodes -o json | jq -r '.items[] | select(.metadata.labels["agentpool"] == "nplinux") | .metadata.name')
                  for node in $NPLINUX_NODES; do
                    echo "Labeling node $node as high-nic"
                    kubectl --kubeconfig /tmp/$cluster.kubeconfig label node "$node" nic-capacity=high-nic --overwrite || echo "Warning: Failed to label $node"
                  done
                  
                  # Verify labels were applied
                  echo "Verifying nic-capacity labels on $cluster:"
                  kubectl --kubeconfig /tmp/$cluster.kubeconfig get nodes -L nic-capacity
                done
                echo "All nodes labeled with nic-capacity"
                
                echo "==> Getting storage account names"
                STORAGE_ACCOUNT_1="$(storageAccount1)"
                STORAGE_ACCOUNT_2="$(storageAccount2)"
                
                # If variables are empty (when runSetupStages=false), discover from resource group
                if [ -z "$STORAGE_ACCOUNT_1" ] || [ -z "$STORAGE_ACCOUNT_2" ]; then
                  echo "Storage account variables not set, discovering from resource group..."
                  STORAGE_ACCOUNT_1=$(az storage account list -g $(rgName) --query "[?starts_with(name, 'sa1')].name" -o tsv)
                  STORAGE_ACCOUNT_2=$(az storage account list -g $(rgName) --query "[?starts_with(name, 'sa2')].name" -o tsv)
                  echo "Discovered: STORAGE_ACCOUNT_1=$STORAGE_ACCOUNT_1, STORAGE_ACCOUNT_2=$STORAGE_ACCOUNT_2"
                fi
                
                export STORAGE_ACCOUNT_1
                export STORAGE_ACCOUNT_2
                
                echo "==> Running datapath lifecycle tests (create → connectivity → private endpoint → cleanup)"
                export RG="$(rgName)"
                cd ./test/integration/swiftv2/longRunningCluster
                ginkgo -v --timeout=2h


              