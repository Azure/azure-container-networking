pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

variables:
  FUNCTION_API_APP_ID_URI: api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Authenticated trigger/status validation
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                API_BASE="https://acn-dalec-e2e-dfazhxbfg4frcwbg.westcentralus-01.azurewebsites.net"
                HTTP_TRIGGER_URL="${API_BASE}/api/httptrigger"
                TRIGGER_URL="${API_BASE}/api/trigger/cni"
                STATUS_URL="${API_BASE}/api/status/cni"

                TOKEN="$(az account get-access-token --scope "${FUNCTION_API_APP_ID_URI}/.default" --query accessToken -o tsv)"
                if [ -z "${TOKEN}" ]; then
                  echo "Failed to acquire bearer token"
                  exit 1
                fi

                HTTP_TRIGGER_CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
                  --max-time 30 \
                  -X GET "${HTTP_TRIGGER_URL}" \
                  -H "Authorization: Bearer ${TOKEN}")"

                echo "HTTP_TRIGGER_HTTP_CODE=${HTTP_TRIGGER_CODE}"
                if [ "${HTTP_TRIGGER_CODE}" -lt 200 ] || [ "${HTTP_TRIGGER_CODE}" -ge 300 ]; then
                  echo "httptrigger request failed"
                  exit 1
                fi

                TRIGGER_RESPONSE="$(curl -sS -w "\n%{http_code}" \
                  --max-time 30 \
                  -X POST "${TRIGGER_URL}" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{}')"

                TRIGGER_BODY="$(printf '%s' "${TRIGGER_RESPONSE}" | sed '$d')"
                TRIGGER_CODE="$(printf '%s' "${TRIGGER_RESPONSE}" | tail -n1)"

                echo "TRIGGER_HTTP_CODE=${TRIGGER_CODE}"
                if [ "${TRIGGER_CODE}" -lt 200 ] || [ "${TRIGGER_CODE}" -ge 300 ]; then
                  echo "Trigger request failed. response=${TRIGGER_BODY}"
                  exit 1
                fi

                RUN_ID="$(printf '%s' "${TRIGGER_BODY}" \
                  | grep -oE '"runId"[[:space:]]*:[[:space:]]*("[^"]+"|[0-9]+)' \
                  | head -n1 \
                  | sed -E 's/.*:[[:space:]]*"?([^\"]+)"?/\1/' || true)"

                if [ -z "${RUN_ID}" ]; then
                  RUN_ID="$(printf '%s' "${TRIGGER_BODY}" \
                    | grep -oE '"id"[[:space:]]*:[[:space:]]*("[^"]+"|[0-9]+)' \
                    | head -n1 \
                    | sed -E 's/.*:[[:space:]]*"?([^\"]+)"?/\1/' || true)"
                fi

                if [ -z "${RUN_ID}" ]; then
                  echo "Trigger response missing runId/id. response=${TRIGGER_BODY}"
                  exit 1
                fi

                STATUS_RESPONSE="$(curl -sS -w "\n%{http_code}" \
                  --max-time 30 \
                  -X GET "${STATUS_URL}?runId=${RUN_ID}" \
                  -H "Authorization: Bearer ${TOKEN}")"

                STATUS_BODY="$(printf '%s' "${STATUS_RESPONSE}" | sed '$d')"
                STATUS_CODE="$(printf '%s' "${STATUS_RESPONSE}" | tail -n1)"

                echo "RUN_ID=${RUN_ID}"
                echo "STATUS_HTTP_CODE=${STATUS_CODE}"
                if [ "${STATUS_CODE}" -lt 200 ] || [ "${STATUS_CODE}" -ge 300 ]; then
                  echo "Status request failed. runId=${RUN_ID} response=${STATUS_BODY}"
                  exit 1
                fi

