pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

variables:
  FUNCTION_API_APP_ID_URI: api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Acquire app-role token for Function API
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if [ -z "${FUNCTION_API_APP_ID_URI:-}" ]; then
                  echo "FUNCTION_API_APP_ID_URI is not set; skipping bearer token acquisition"
                  exit 0
                fi

                TOKEN="$(az account get-access-token --scope "${FUNCTION_API_APP_ID_URI}/.default" --query accessToken -o tsv 2>/dev/null || true)"
                if [ -z "${TOKEN}" ]; then
                  echo "Could not acquire bearer token; will rely on function key if provided"
                  exit 0
                fi

                echo "##vso[task.setvariable variable=FUNCTION_API_BEARER;issecret=true]${TOKEN}"

          - task: AzureCLI@2
            displayName: Manual auth test to Function API
            env:
              FUNCTION_API_BEARER: $(FUNCTION_API_BEARER)
              FUNCTION_API_KEY: $(FUNCTION_API_KEY)
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                API_BASE="https://acn-dalec-e2e-dfazhxbfg4frcwbg.westcentralus-01.azurewebsites.net"
                TOKEN="${FUNCTION_API_BEARER:-}"
                FUNCTION_KEY="${FUNCTION_API_KEY:-HLVHTYcVlOxIfBV953H-X--iwWK5ulmZ3Eegp2x73HYQAzFuNI95dA==}"
                AUTH_HEADERS=()
                REQUEST_URL="${API_BASE}/api/trigger/cni"

                if [ -n "${FUNCTION_KEY}" ]; then
                  REQUEST_URL="${API_BASE}/api/trigger/cni?code=${FUNCTION_KEY}"
                elif [ -n "${TOKEN}" ]; then
                  AUTH_HEADERS+=("-H" "Authorization: Bearer ${TOKEN}")
                fi

                if [ ${#AUTH_HEADERS[@]} -eq 0 ]; then
                  if [ -z "${FUNCTION_KEY}" ]; then
                    echo "No auth provided. Set FUNCTION_API_KEY, or configure bearer token acquisition."
                    exit 1
                  fi
                fi

                HDR_FILE="$(mktemp)"
                BODY_FILE="$(mktemp)"

                CODE="$(curl -sS -w "%{http_code}" \
                  -D "${HDR_FILE}" \
                  -o "${BODY_FILE}" \
                  --max-time 30 \
                  -X POST "${REQUEST_URL}" \
                  "${AUTH_HEADERS[@]}" \
                  -H "Content-Type: application/json" \
                  -d '{}')"

                echo "HTTP_CODE=${CODE}"
                if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
                  echo "Request failed"
                  echo "Response headers (auth hints):"
                  grep -Ei 'www-authenticate|x-ms-|server|x-powered-by' "${HDR_FILE}" || true
                  echo "Response body (first 400 chars):"
                  head -c 400 "${BODY_FILE}" || true
                  exit 1
                fi

