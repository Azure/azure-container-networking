pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

variables:
  FUNCTION_API_APP_ID_URI: api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Manual auth test to Function API (federated)
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                API_BASE="https://acn-dalec-e2e-dfazhxbfg4frcwbg.westcentralus-01.azurewebsites.net"

                if [ -z "${FUNCTION_API_APP_ID_URI:-}" ]; then
                  echo "FUNCTION_API_APP_ID_URI is not set"
                  exit 1
                fi

                TOKEN="$(az account get-access-token --scope "${FUNCTION_API_APP_ID_URI}/.default" --query accessToken -o tsv 2>/dev/null || true)"
                if [ -z "${TOKEN}" ]; then
                  echo "Failed to acquire bearer token for ${FUNCTION_API_APP_ID_URI}/.default"
                  exit 1
                fi

                HDR_FILE="$(mktemp)"
                BODY_FILE="$(mktemp)"

                CODE="$(curl -sS -w "%{http_code}" \
                  -D "${HDR_FILE}" \
                  -o "${BODY_FILE}" \
                  --max-time 30 \
                  -X POST "${API_BASE}/api/trigger/cni" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{}')"

                echo "HTTP_CODE=${CODE}"
                if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
                  echo "Request failed"
                  echo "Response headers (auth hints):"
                  grep -Ei 'www-authenticate|x-ms-|server|x-powered-by' "${HDR_FILE}" || true
                  echo "Response body (first 400 chars):"
                  head -c 400 "${BODY_FILE}" || true
                  exit 1
                fi

