pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

variables:
  FUNCTION_API_APP_ID_URI: api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b
  DALEC_IMAGE_PATH: acnpublic.azurecr.io/msp/azure-cns:v1.7.12

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Authenticated trigger/status validation
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: scriptPath
              scriptPath: .pipelines/test.sh
              arguments: --image "$(DALEC_IMAGE_PATH)"

