pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

variables:
  FUNCTION_API_APP_ID_URI: api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Authenticated trigger/status validation
            inputs:
              azureSubscription: acn-dalec-test
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                API_BASE="https://acn-dalec-e2e-dfazhxbfg4frcwbg.westcentralus-01.azurewebsites.net"
                TRIGGER_URL="${API_BASE}/api/trigger/cni"
                STATUS_URL="${API_BASE}/api/status/cni"

                TOKEN="$(az account get-access-token --scope "${FUNCTION_API_APP_ID_URI}/.default" --query accessToken -o tsv)"
                if [ -z "${TOKEN}" ]; then
                  echo "Failed to acquire bearer token"
                  exit 1
                fi

                # Print non-sensitive token claims to help diagnose Easy Auth authorization failures.
                export TOKEN
                python3 - <<'PY'
                import base64
                import json
                import os

                token = os.environ.get("TOKEN", "")
                parts = token.split('.')
                if len(parts) < 2:
                    print("TOKEN_DEBUG=unparseable")
                    raise SystemExit(0)

                payload = parts[1]
                payload += '=' * (-len(payload) % 4)
                try:
                    data = json.loads(base64.urlsafe_b64decode(payload.encode()).decode())
                except Exception:
                    print("TOKEN_DEBUG=decode_failed")
                    raise SystemExit(0)

                def _val(v):
                    if isinstance(v, list):
                        return ','.join(str(x) for x in v)
                    return str(v) if v is not None else ''

                print(f"TOKEN_AUD={_val(data.get('aud'))}")
                print(f"TOKEN_APPID={_val(data.get('appid'))}")
                print(f"TOKEN_AZP={_val(data.get('azp'))}")
                print(f"TOKEN_ROLES={_val(data.get('roles'))}")
                print(f"TOKEN_SCP={_val(data.get('scp'))}")
                PY

                HDR_FILE="$(mktemp)"
                BODY_FILE="$(mktemp)"

                TRIGGER_CODE="$(curl -sS -w "%{http_code}" \
                  -D "${HDR_FILE}" \
                  -o "${BODY_FILE}" \
                  --max-time 30 \
                  -X POST "${TRIGGER_URL}" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{}')"

                echo "TRIGGER_HTTP_CODE=${TRIGGER_CODE}"
                if [ "${TRIGGER_CODE}" -lt 200 ] || [ "${TRIGGER_CODE}" -ge 300 ]; then
                  echo "Trigger request failed"
                  echo "Response headers (auth hints):"
                  grep -Ei 'www-authenticate|x-ms-|server|x-powered-by' "${HDR_FILE}" || true
                  echo "Response body (first 400 chars):"
                  head -c 400 "${BODY_FILE}" || true
                  exit 1
                fi

                STATUS_CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
                  --max-time 30 \
                  -X GET "${STATUS_URL}" \
                  -H "Authorization: Bearer ${TOKEN}")"

                echo "STATUS_HTTP_CODE=${STATUS_CODE}"
                if [ "${STATUS_CODE}" -lt 200 ] || [ "${STATUS_CODE}" -ge 300 ]; then
                  echo "Status request failed"
                  exit 1
                fi

