pr:
  branches:
    include:
      - master
      - release/*
  paths:
    exclude:
      - ".devcontainer"
      - ".hooks"
      - ".vscode"
      - ".github"
      - docs

trigger:
  branches:
    include:
      - gh-readonly-queue/master/*
      - gh-readonly-queue/release/*
  tags:
    include:
      - "*"

schedules:
- cron: "0 2 * * *" # Every day at 2am
  displayName: "Official Nightly Pipeline"
  branches:
    include: ["master"]
  always: true

stages:
  - stage: manual_auth_test_to_function_api
    displayName: Manual Auth Test To Function API
    jobs:
      - job: manual_auth_test
        displayName: Manual auth test to Function API
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Manual auth test to Function API
            inputs:
              azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                API_BASE="https://acn-dalec-e2e-dfazhxbfg4frcwbg.westcentralus-01.azurewebsites.net"
                API_AUDIENCE="api://d3b254c1-a8e6-44c0-a1ed-f23fb70a432b"

                TOKEN="$(az account get-access-token --resource "${API_AUDIENCE}" --query accessToken -o tsv)"

                CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
                  -X POST "${API_BASE}/api/trigger/cni" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{}')"

                echo "HTTP_CODE=${CODE}"

