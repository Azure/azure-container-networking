parameters:
  - name: name
    type: string
    default: ""
  - name: displayName
    type: string
    default: ""
  - name: clusterType
    type: string
    default: ""
  - name: clusterName
    type: string
    default: ""
  - name: vmSize
    type: string
    default: ""
  - name: k8sVersion
    type: string
    default: ""
  - name: dependsOn
    type: object
    default: ""

stages:
  - stage: ${{ parameters.clusterName }}
    displayName: ${{ parameters.displayName }} - Create Cluster
    condition: eq(dependencies.setup.outputs['env.GitDiffCheck.RunWindowsTests'], 'true')
    dependsOn:
      - ${{ parameters.dependsOn }}
      - setup
      - publish
    pool:
      name: $(BUILD_POOL_NAME_DEFAULT)
    variables:
      commitID: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.commitID'] ]
      runWindowsTest: $[ stagedependencies.setup.env.outputs['GitDiffCheck.RunWindowsTests'] ]
      AZURE_IPAM_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.ipamVersion'] ]
      CNI_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cniVersion'] ]
      CNS_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cnsVersion'] ]
      CNS_IMAGE_REPO: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cnsImageRepo'] ]
      IPAM_IMAGE_REPO: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.ipamImageRepo'] ]
      CNI_IMAGE_REPO: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cniImageRepo'] ]
      CNS_IMAGE_NAME_OVERRIDE: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cnsImageNameOverride'] ]
      IPAM_IMAGE_NAME_OVERRIDE: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.ipamImageNameOverride'] ]
      CNI_IMAGE_NAME_OVERRIDE: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cniImageNameOverride'] ]
    jobs:
      - job: ${{ parameters.name }}
        displayName: Cluster - ${{ parameters.name }}
        steps:
          - template: ../../templates/create-cluster-steps.yaml
            parameters:
              clusterType: ${{ parameters.clusterType }}
              clusterName: ${{ parameters.clusterName }}-$(commitID)
              vmSize: ${{ parameters.vmSize }}
              k8sVersion: ${{ parameters.k8sVersion }}
              region: $(REGION_AKS_CLUSTER_TEST)
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -e

                windows_nodepool=$(az aks nodepool list \
                --resource-group ${{ parameters.clusterName }}-$(commitID) \
                --cluster-name ${{ parameters.clusterName }}-$(commitID) \
                --query "[?osType=='Windows']" \
                --output tsv)

                if [ -z "$windows_nodepool" ]; then
                  echo "No Windows node pool found in the AKS cluster."
                  while true; do
                    cluster_state=$(az aks show \
                    --name "${{ parameters.clusterName }}-$(commitID)" \
                    --resource-group "${{ parameters.clusterName }}-$(commitID)" \
                    --query provisioningState)
                    if echo "$cluster_state" | grep -q "Updating"; then
                      echo "Cluster is updating. Sleeping for 30 seconds..."
                      sleep 30
                    else
                      break
                    fi
                  done
                  echo "Cluster state is: $cluster_state"
                  make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=${{ parameters.clusterName }}-$(commitID)
                  make -C ./hack/aks windows-nodepool-up AZCLI=az SUB=$(SUB_AZURE_NETWORK_AGENT_BUILD_VALIDATIONS) CLUSTER=${{ parameters.clusterName }}-$(commitID) VM_SIZE_WIN=${{ parameters.vmSize }}
                  echo "Windows node was successfully added"
                  kubectl cluster-info
                  kubectl get node -owide
                  kubectl get po -owide -A
                else
                  echo "Windows node pool already exists in the AKS cluster."
                fi
            name: "Add_Windows_Node"
            displayName: "Add windows node to cluster"
            retryCountOnTaskFailure: 5
          - template: ../../templates/network-install.yaml
            parameters:
              clusterName: ${{ parameters.clusterName }}-$(commitID)
              networkType: azure-cni-overlay-stateless
              azureIpamVersion: $(AZURE_IPAM_VERSION)
              cnsVersion: $(CNS_VERSION)
              cniVersion: $(CNI_VERSION)
              installFlag: INSTALL_AZURE_VNET_STATELESS
              os: windows
  - stage: ${{ parameters.name }}
    displayName: E2E - ${{ parameters.displayName }}
    dependsOn:
    - setup
    - publish
    - ${{ parameters.clusterName }}
    variables:
      commitID: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.commitID'] ]
      IMAGE_REPO_PATH: $[ stageDependencies.setup.env.outputs['EnvironmentalVariables.imageRepositoryPath'] ]
      CNS_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cnsVersion'] ]
      AZURE_IPAM_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.ipamVersion'] ]
      CNI_VERSION: $[ stagedependencies.setup.env.outputs['EnvironmentalVariables.cniVersion'] ]



      CNS_IMAGE_NAME_OVERRIDE: $[ stageDependencies.setup.env.outputs['EnvironmentalVariables.cnsImageNameOverride'] ]
      IPAM_IMAGE_NAME_OVERRIDE: $[ stageDependencies.setup.env.outputs['EnvironmentalVariables.ipamImageNameOverride'] ]
      CNI_IMAGE_NAME_OVERRIDE: $[ stageDependencies.setup.env.outputs['EnvironmentalVariables.cniImageNameOverride'] ]
      GOPATH: "$(Agent.TempDirectory)/go" # Go workspace path
      GOBIN: "$(GOPATH)/bin" # Go binaries path
      modulePath: "$(GOPATH)/src/github.com/Azure/azure-container-networking"
    pool:
      name: $(BUILD_POOL_NAME_DEFAULT)
    jobs:
      - job: ${{ parameters.name }}_windows
        displayName: Azure Stateless CNI Overlay Test Suite | Windows - (${{ parameters.name }})
        timeoutInMinutes: 120
        # error handled by warning-handler job below
        continueOnError: true
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
          demands:
          - agent.os -equals Linux
          - Role -equals $(CUSTOM_E2E_ROLE)
        steps:
          - template: ../../templates/windows-overlay-e2e-step-template.yaml
            parameters:
              name: ${{ parameters.name }}
              clusterName: ${{ parameters.clusterName }}-$(commitID)
              cniType: stateless
              validateCniType: stateless
              testLoadArgs: "VALIDATE_V4OVERLAY=true"
              runWireserverTests: "true"
          - template: ../../templates/k8s-e2e-step-template.yaml
            parameters:
              sub: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
              clusterName: ${{ parameters.clusterName }}-$(commitID)
              os: windows
              datapath: true
              dns: true
              portforward: true
              hostport: true
              service: true
              hybridWin: true

      # can only succeed with issues in windows
      - template: ../../templates/warning-handler-job-template.yaml
        parameters:
          dependsOnToEmitWarning: ${{ parameters.name }}_windows
          clusterName: ${{ parameters.clusterName }}-$(commitID)
          fileSearchPattern: "azure-vnet*.log"
          # known windows issues that occur only in testing:
          # - windows blue screens and writes null characters to the statefile, making it unrecoverable
          # - the hns network gets deleted outside of the cni's control, so it still thinks the network exists
          searchPattern: "\\x00|\\\\x00|hcnOpenNetwork failed in Win32: The network was not found"
          cni: cniv2
          os: windows

      - job: failedE2ELogs_windows
        displayName: "Windows Failure Logs"
        dependsOn:
          - ${{ parameters.name }}_windows
        condition: in(dependencies.${{ parameters.name }}_windows.result, 'Failed', 'SucceededWithIssues')
        steps:
          - template: ../../templates/log-template.yaml
            parameters:
              clusterName: ${{ parameters.clusterName }}-$(commitID)
              os: windows
              cni: cniv2

      - template: ../../templates/failure-analysis.job.yaml
        parameters:
          clusterName: ${{ parameters.clusterName }}-$(commitID)
          os: windows
          cni: cniv2
          dependsOnJob: failedE2ELogs_windows
