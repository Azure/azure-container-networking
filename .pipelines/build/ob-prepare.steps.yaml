- bash: |
    rm -rf .hooks .github
  displayName: "Remove Unnecessary Dirs from Source"
  workingDirectory: $(Build.SourcesDirectory)/azure-container-networking

- task: CopyFiles@2
  displayName: "Add Repo to Container Artifacts"
  inputs:
    sourceFolder: $(Build.SourcesDirectory)/azure-container-networking
    targetFolder: $(Build.ArtifactStagingDirectory)

- script: |
    STORAGE_ID=$(echo "${BUILD_BUILDNUMBER//./-}")
    echo "##vso[task.setvariable variable=StorageID;isOutput=true]$STORAGE_ID"
    echo "StorageID: $STORAGE_ID"

    COMMITID=$(git rev-parse --short HEAD)
    COMMITID="$COMMITID"-"$(date "+%d%H%M")"
    echo "##vso[task.setvariable variable=commitID;isOutput=true]$COMMITID"
    echo "commitID: $COMMITID"

    TAG=$(make version)
    echo "##vso[task.setvariable variable=Tag;isOutput=true]$TAG"
    echo "Tag: $TAG"

    IMAGEREPOPATH="artifact/dd590928-4e04-48cb-9d3d-ee06c5f0e17f/$BUILD_TYPE"
    echo "##vso[task.setvariable variable=imageRepositoryPath;isOutput=true]$IMAGEREPOPATH"
    echo "imageRepositoryPath: $IMAGEREPOPATH"

    AZUREIPAMVERSION=$(make azure-ipam-version)
    echo "##vso[task.setvariable variable=azureIpamVersion;isOutput=true]$AZUREIPAMVERSION"
    echo "azureIpamVersion: $AZUREIPAMVERSION"

    AZUREIPMASQMERGERVERSION=$(make azure-ip-masq-merger-version)
    echo "##vso[task.setvariable variable=azureIpMasqMergerVersion;isOutput=true]$AZUREIPMASQMERGERVERSION"
    echo "azureIpMasqMergerVersion: $AZUREIPMASQMERGERVERSION"

    AZUREIPTABLESMONITORVERSION=$(make azure-iptables-monitor-version)
    echo "##vso[task.setvariable variable=azureIptablesMonitorVersion;isOutput=true]$AZUREIPTABLESMONITORVERSION"
    echo "azureIptablesMonitorVersion: $AZUREIPTABLESMONITORVERSION"

    CILIUMLOGCOLLECTORVERSION=$(make cilium-log-collector-version)
    echo "##vso[task.setvariable variable=ciliumLogCollectorVersion;isOutput=true]$CILIUMLOGCOLLECTORVERSION"
    echo "ciliumLogCollectorVersion: $CILIUMLOGCOLLECTORVERSION"

    AZUREBLOCKIPTABLESVERSION=$(make azure-block-iptables-version)
    echo "##vso[task.setvariable variable=azureBlockIptablesVersion;isOutput=true]$AZUREBLOCKIPTABLESVERSION"
    echo "azureBlockIptablesVersion: $AZUREBLOCKIPTABLESVERSION"

    CNIVERSION=$(make cni-version)
    echo "##vso[task.setvariable variable=cniVersion;isOutput=true]$CNIVERSION"
    echo "cniVersion: $CNIVERSION"

    CNSVERSION=$(make cns-version)
    echo "##vso[task.setvariable variable=cnsVersion;isOutput=true]$CNSVERSION"
    echo "cnsVersion: $CNSVERSION"

    IPV6HPBPFVERSION=$(make ipv6-hp-bpf-version)
    echo "##vso[task.setvariable variable=ipv6HpBpfVersion;isOutput=true]$IPV6HPBPFVERSION"
    echo "ipv6HpBpfVersion: $IPV6HPBPFVERSION"

    NPMVERSION=$(make npm-version)
    echo "##vso[task.setvariable variable=npmVersion;isOutput=true]$NPMVERSION"
    echo "npmVersion: $NPMVERSION"

    parse_override_image() {
      local image="$1"
      local default_name="$2"
      local default_version="$3"
      local use_flag="false"
      local repo_key="ACN"
      local registry_url="acnpublic.azurecr.io"
      local image_name="$default_name"
      local image_version="$default_version"

      if [ -n "$image" ] && [ "$image" != "__use-default__" ]; then
        use_flag="true"
        if [[ "$image" == *":"* ]]; then
          image_version="${image##*:}"
          image="${image%:*}"
        fi

        if [[ "$image" == acnpublic.azurecr.io/* ]]; then
          image_name="${image#acnpublic.azurecr.io/}"
          repo_key="ACN"
          registry_url="acnpublic.azurecr.io"
        elif [[ "$image" == mcr.microsoft.com/containernetworking/* ]]; then
          image_name="${image#mcr.microsoft.com/containernetworking/}"
          repo_key="MCR"
          registry_url="mcr.microsoft.com/containernetworking"
        else
          # Keep backward-compatible behavior by treating unknown values as image name overrides.
          image_name="$image"
          repo_key="ACN"
          registry_url="acnpublic.azurecr.io"
        fi
      fi

      echo "$use_flag|$repo_key|$image_name|$image_version|$registry_url"
    }

    CNI_OVERRIDE=$(parse_override_image "$(OVERRIDE_CNI_IMAGE)" "${IMAGEREPOPATH}/cni" "$CNIVERSION")
    CNS_OVERRIDE=$(parse_override_image "$(OVERRIDE_CNS_IMAGE)" "${IMAGEREPOPATH}/cns" "$CNSVERSION")
    IPAM_OVERRIDE=$(parse_override_image "$(OVERRIDE_IPAM_IMAGE)" "${IMAGEREPOPATH}/azure-ipam" "$AZUREIPAMVERSION")

    CNI_USE_OVERRIDE=$(echo "$CNI_OVERRIDE" | cut -d'|' -f1)
    CNI_REPO_KEY=$(echo "$CNI_OVERRIDE" | cut -d'|' -f2)
    CNI_IMAGE_NAME_OVERRIDE=$(echo "$CNI_OVERRIDE" | cut -d'|' -f3)
    CNIVERSION=$(echo "$CNI_OVERRIDE" | cut -d'|' -f4)
    CNI_REGISTRY_URL=$(echo "$CNI_OVERRIDE" | cut -d'|' -f5)

    CNS_USE_OVERRIDE=$(echo "$CNS_OVERRIDE" | cut -d'|' -f1)
    CNS_REPO_KEY=$(echo "$CNS_OVERRIDE" | cut -d'|' -f2)
    CNS_IMAGE_NAME_OVERRIDE=$(echo "$CNS_OVERRIDE" | cut -d'|' -f3)
    CNSVERSION=$(echo "$CNS_OVERRIDE" | cut -d'|' -f4)
    CNS_REGISTRY_URL=$(echo "$CNS_OVERRIDE" | cut -d'|' -f5)

    IPAM_USE_OVERRIDE=$(echo "$IPAM_OVERRIDE" | cut -d'|' -f1)
    IPAM_REPO_KEY=$(echo "$IPAM_OVERRIDE" | cut -d'|' -f2)
    IPAM_IMAGE_NAME_OVERRIDE=$(echo "$IPAM_OVERRIDE" | cut -d'|' -f3)
    AZUREIPAMVERSION=$(echo "$IPAM_OVERRIDE" | cut -d'|' -f4)
    IPAM_REGISTRY_URL=$(echo "$IPAM_OVERRIDE" | cut -d'|' -f5)

    echo "##vso[task.setvariable variable=useProvidedCniImage;isOutput=true]$CNI_USE_OVERRIDE"
    echo "##vso[task.setvariable variable=useProvidedCnsImage;isOutput=true]$CNS_USE_OVERRIDE"
    echo "##vso[task.setvariable variable=useProvidedIpamImage;isOutput=true]$IPAM_USE_OVERRIDE"

    echo "##vso[task.setvariable variable=cniImageRepo;isOutput=true]$CNI_REPO_KEY"
    echo "##vso[task.setvariable variable=cnsImageRepo;isOutput=true]$CNS_REPO_KEY"
    echo "##vso[task.setvariable variable=ipamImageRepo;isOutput=true]$IPAM_REPO_KEY"
    echo "##vso[task.setvariable variable=cniImageRegistry;isOutput=true]$CNI_REGISTRY_URL"
    echo "##vso[task.setvariable variable=cnsImageRegistry;isOutput=true]$CNS_REGISTRY_URL"
    echo "##vso[task.setvariable variable=ipamImageRegistry;isOutput=true]$IPAM_REGISTRY_URL"

    echo "##vso[task.setvariable variable=cniImageNameOverride;isOutput=true]$CNI_IMAGE_NAME_OVERRIDE"
    echo "##vso[task.setvariable variable=cnsImageNameOverride;isOutput=true]$CNS_IMAGE_NAME_OVERRIDE"
    echo "##vso[task.setvariable variable=ipamImageNameOverride;isOutput=true]$IPAM_IMAGE_NAME_OVERRIDE"

    CNS_IMAGE_PREFIX="${CNS_IMAGE_NAME_OVERRIDE%/cns}"
    if [ "$CNS_IMAGE_PREFIX" = "$CNS_IMAGE_NAME_OVERRIDE" ]; then
      CNS_IMAGE_PREFIX="${CNS_IMAGE_NAME_OVERRIDE%/*}"
    fi
    if [ -n "$CNS_IMAGE_PREFIX" ]; then
      CNS_IMAGE_PREFIX="${CNS_IMAGE_PREFIX}/"
    fi
    echo "##vso[task.setvariable variable=cnsImagePrefix;isOutput=true]$CNS_IMAGE_PREFIX"

    # Re-emit potentially overridden versions for downstream stages.
    echo "##vso[task.setvariable variable=azureIpamVersion;isOutput=true]$AZUREIPAMVERSION"
    echo "##vso[task.setvariable variable=cniVersion;isOutput=true]$CNIVERSION"
    echo "##vso[task.setvariable variable=cnsVersion;isOutput=true]$CNSVERSION"

    echo "Resolved CNI image: ${CNI_IMAGE_NAME_OVERRIDE}:${CNIVERSION} (repo ${CNI_REPO_KEY})"
    echo "Resolved CNS image: ${CNS_IMAGE_NAME_OVERRIDE}:${CNSVERSION} (repo ${CNS_REPO_KEY})"
    echo "Resolved IPAM image: ${IPAM_IMAGE_NAME_OVERRIDE}:${AZUREIPAMVERSION} (repo ${IPAM_REPO_KEY})"

    cat /etc/os-release
    uname -a
    sudo chown -R $(whoami):$(whoami) .
    go version
    go env
    which go
    echo $PATH
    echo "------"
    echo $(Build.QueuedBy)
    echo $(Build.Reason) # manual, PR, IndividualCI
    echo $(Build.SourceBranch)
  name: "EnvironmentalVariables"
  displayName: "Set environmental variables"
  condition: always()
  workingDirectory: $(ACN_DIR)
