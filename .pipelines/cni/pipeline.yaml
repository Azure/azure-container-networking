# >>> TEMP TEST COMMIT - revert before merge <<<
# Trimmed to Cilium Overlay only for testing failure-analysis agent with a
# natural bug in test/validate/linux_validate.go (cnsCachedAssignedIPStateCmd).
pr: none
trigger:
  tags:
    include:
    - dropgz/*
    - azure-ipam/*
    - v*
parameters:
  - name: upgradeScenario
    type: boolean
    default: false

stages:
  - stage: setup
    displayName: Setup
    jobs:
      - job: env
        displayName: Setup
        pool:
          name: "$(BUILD_POOL_NAME_DEFAULT)"
        steps:
          - script: |
              echo "Setting up environment"
              go version
              echo "##vso[task.setvariable variable=commitID;isOutput=true]$(echo $(make revision)-$(date "+%d%H%M"))"
              echo "##vso[task.setvariable variable=npmVersion;isOutput=true]$(make npm-version)"
            name: "SetEnvVars"
            displayName: "Set Environment Variables"
            condition: always()

  - stage: build_images
    dependsOn: setup
    displayName: "Build Images"
    jobs:
      - job: containerize_amd64
        displayName: Build Images
        pool:
          name: "$(BUILD_POOL_NAME_LINUX_AMD64)"
        strategy:
          matrix:
            azure_ipam_linux_amd64:
              arch: amd64
              name: azure-ipam
              os: linux
            azure_ipam_windows_amd64:
              arch: amd64
              name: azure-ipam
              os: windows
            cni_linux_amd64:
              arch: amd64
              name: cni
              os: linux
            cni_windows_amd64:
              arch: amd64
              name: cni
              os: windows
            cns_linux_amd64:
              arch: amd64
              name: cns
              os: linux
            cns_windows_amd64:
              arch: amd64
              name: cns
              os: windows
            ipv6_hp_bpf_linux_amd64:
              arch: amd64
              name: ipv6-hp-bpf
              os: linux
            npm_linux_amd64:
              arch: amd64
              name: npm
              os: linux
            npm_windows_amd64:
              arch: amd64
              name: npm
              os: windows
            cilium_log_collector_amd64:
                arch: amd64
                name: cilium-log-collector
                os: linux
        steps:
          - template: ../containers/container-template.yaml
            parameters:
              arch: $(arch)
              name: $(name)
              os: $(os)
      - job: containerize_linux_arm64
        displayName: Build Images
        pool:
          name: "$(BUILD_POOL_NAME_LINUX_ARM64)"
        strategy:
          matrix:
              azure_ipam_linux_arm64:
                arch: arm64
                name: azure-ipam
                os: linux
              cni_linux_arm64:
                arch: arm64
                name: cni
                os: linux
              cns_linux_arm64:
                arch: arm64
                name: cns
                os: linux
              ipv6_hp_bpf_linux_arm64:
                arch: arm64
                name: ipv6-hp-bpf
                os: linux
              npm_linux_arm64:
                arch: arm64
                name: npm
                os: linux
              cilium_log_collector_arm64:
                arch: arm64
                name: cilium-log-collector
                os: linux
        steps:
          - template: ../containers/container-template.yaml
            parameters:
              arch: $(arch)
              name: $(name)
              os: $(os)

  - stage: publish
    displayName: Publish Multiarch Manifests
    dependsOn:
      - build_images
    jobs:
      - job: manifest
        displayName: Compile Manifests
        pool:
          name: "$(BUILD_POOL_NAME_DEFAULT)"
        strategy:
          matrix:
            azure-ipam:
              name: azure-ipam
              platforms: linux/amd64 linux/arm64 windows/amd64
            cni:
              name: cni
              platforms: linux/amd64 linux/arm64 windows/amd64
            cns:
              name: cns
              platforms: linux/amd64 linux/arm64 windows/amd64
            ipv6-hp-bpf:
              name: ipv6-hp-bpf
              platforms: linux/amd64 linux/arm64
            npm:
              name: npm
              platforms: linux/amd64 linux/arm64 windows/amd64
            cilium_log_collector:
              name: cilium-log-collector
              platforms: linux/amd64 linux/arm64
        steps:
          - template: ../containers/manifest-template.yaml
            parameters:
              name: $(name)
              os_versions: $(os_versions)
              platforms: $(platforms)

## Cilium Overlay E2E (trimmed - only this stage for testing)
  - template: cilium/cilium-overlay-load-test-template.yaml
    parameters:
      name: cilium_overlay
      clusterType: overlay-byocni-nokubeproxy-up
      clusterName: "cilium-over"
      nodeCount: ${NODE_COUNT_CILIUM}
      vmSize: ${VM_SIZE_CILIUM}
      arch: amd64
      cni: "cilium"
      upgradeScenario: false

  - stage: delete_resources
    displayName: "Delete Resources"
    pool:
      name: "$(BUILD_POOL_NAME_DEFAULT)"
    condition: always()
    dependsOn:
      - cilium_overlay
      - setup
    variables:
      commitID: $[ stagedependencies.setup.env.outputs['SetEnvVars.commitID'] ]
    jobs:
      - job: delete
        displayName: Delete Cluster
        pool:
          name: "$(BUILD_POOL_NAME_DEFAULT)"
        strategy:
          matrix:
            cilium_overlay:
              name: cilium_overlay
              clusterName: "cilium-over"
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -x

                if [[ ${clusterName} =~ 'rdma' ]]; then
                  region=${LOCATION_RDMA}
                elif [[ ${clusterName} =~ 'arm' ]]; then
                  region=${LOCATION_ARM64}
                else
                  region=${LOCATION_AMD64}
                fi

                if [ "$(DELETE_RESOURCES)" ]
                then
                  echo "Deleting Cluster and resource group"
                  make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=$(clusterName)-$(commitID)
                  make -C ./hack/aks azcfg AZCLI=az REGION=${region}
                  make -C ./hack/aks down AZCLI=az REGION=${region} SUB=$(SUB_AZURE_NETWORK_AGENT_BUILD_VALIDATIONS) CLUSTER=$(clusterName)-$(commitID)
                  echo "Cluster and resources down"
                else
                  echo "Deletion of resources is False"
                fi
            name: "CleanUpCluster"
            displayName: "Cleanup cluster - $(name)"