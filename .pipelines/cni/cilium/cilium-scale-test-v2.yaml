pr: none
trigger: none

parameters:
  - name: deleteNodepool
    displayName: "Delete secondary nodepool (manual cleanup)"
    type: boolean
    default: false
  - name: deletePrometheusNodepool
    displayName: "Delete prometheus nodepool (manual cleanup)"
    type: boolean
    default: false
  - name: nodeCount
    displayName: "Target node count for secondary nodepool"
    type: number
    default: 110

variables:
  - name: clustername
    value: cilscale-persistent
  - name: REGION_AKS_CLUSTER_TEST
    value: westus2
  - name: SECONDARY_NODEPOOL
    value: npscale
  - name: PROMETHEUS_NODEPOOL
    value: prometheus

stages:
  - stage: clusterLifecycle
    displayName: "Cilium Scale AKS Cluster"
    jobs:
      - job: cluster_lifecycle
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
        timeoutInMinutes: 420
        steps:
          - task: AzureCLI@2
            displayName: "Ensure AKS Cluster Exists"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex
                az extension add --name aks-preview

                if az aks show --resource-group $(clustername) --name $(clustername) --subscription $(TESTING_SUB) &>/dev/null; then
                  echo "Cluster $(clustername) already exists, fetching credentials"
                  make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=$(clustername)
                else
                  echo "Cluster $(clustername) does not exist, creating"
                  make -C ./hack/aks AZCLI=az overlay-byocni-nokubeproxy-up CLUSTER=$(clustername) REGION=$(REGION_AKS_CLUSTER_TEST) NODE_COUNT=2 VM_SIZE=Standard_D4_v3 SUB=$(TESTING_SUB) POD_CIDR="100.64.0.0/10"
                fi
                kubectl get pods -Aowide

          - template: ../../templates/cilium-cli.yaml

          - task: AzureCLI@2
            displayName: "Deploy Cilium and CNS"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex

                echo "Deploy Cilium components"
                make -C ./hack/aks deploy-cilium

                echo "Deploy Azure-CNS"
                make test-load AZURE_IPAM_VERSION=v0.4.0-0 CNI_VERSION=v1.8.1-0 CNS_ONLY=true CNS_VERSION=v1.8.1-0 INSTALL_CNS=true INSTALL_OVERLAY=true CNS_IMAGE_REPO=MCR IPAM_IMAGE_REPO=MCR CNI_IMAGE_REPO=MCR

                echo "Wait for all pods to be ready"
                kubectl get pods -Aowide
                kubectl wait --for=condition=Ready pods --all --all-namespaces --timeout=10m || true
                kubectl get pods -Aowide

          - task: AzureCLI@2
            displayName: "Scale Nodepool Up"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex

                AZCLI="az" GROUP="$(clustername)" CLUSTER="$(clustername)" sh ./hack/scripts/wait-cluster-update.sh
                TARGET_COUNT=${{ parameters.nodeCount }}

                if az aks nodepool show --resource-group $(clustername) --cluster-name $(clustername) --name $(SECONDARY_NODEPOOL) --subscription $(TESTING_SUB) &>/dev/null; then
                  current_count=$(az aks nodepool show --resource-group $(clustername) --cluster-name $(clustername) --name $(SECONDARY_NODEPOOL) --subscription $(TESTING_SUB) --query count -o tsv)
                  echo "Nodepool $(SECONDARY_NODEPOOL) already exists with $current_count nodes"
                else
                  echo "Adding new nodepool $(SECONDARY_NODEPOOL) with 2 nodes"
                  az aks nodepool add \
                    --resource-group $(clustername) \
                    --cluster-name $(clustername) \
                    --name $(SECONDARY_NODEPOOL) \
                    --node-count 2 \
                    --node-vm-size Standard_D4_v3 \
                    --subscription $(TESTING_SUB) \
                    --os-type Linux \
                    --max-pods 250
                  current_count=2
                fi

                BATCH_SIZE=100
                if [ "$current_count" -lt "$TARGET_COUNT" ]; then
                  while [ "$current_count" -lt "$TARGET_COUNT" ]; do
                    new_count=$((current_count + BATCH_SIZE))
                    if [ "$new_count" -gt "$TARGET_COUNT" ]; then
                      new_count=$TARGET_COUNT
                    fi
                    echo "Scaling nodepool from $current_count to $new_count nodes"
                    make -C ./hack/aks scale-nodes AZCLI=az CLUSTER=$(clustername) NODEPOOL=$(SECONDARY_NODEPOOL) NODE_COUNT=$new_count
                    current_count=$new_count
                    if [ "$current_count" -lt "$TARGET_COUNT" ]; then
                      echo "Pausing 30s before next batch..."
                      sleep 30
                      kubectl get nodes -owide
                      kubectl wait --for=condition=Ready pods --all --all-namespaces --timeout=20m || true
                    fi
                  done
                else
                  echo "Nodepool already at $current_count nodes (target: $TARGET_COUNT), skipping scale up"
                fi
                kubectl get nodes -owide
                kubectl wait --for=condition=Ready pods --all --all-namespaces --timeout=20m || true
                kubectl get pods -Aowide

          - task: AzureCLI@2
            displayName: "Ensure Prometheus Nodepool Exists"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex

                AZCLI="az" GROUP="$(clustername)" CLUSTER="$(clustername)" sh ./hack/scripts/wait-cluster-update.sh

                if az aks nodepool show --resource-group $(clustername) --cluster-name $(clustername) --name $(PROMETHEUS_NODEPOOL) --subscription $(TESTING_SUB) &>/dev/null; then
                  echo "Nodepool $(PROMETHEUS_NODEPOOL) already exists"
                else
                  echo "Adding nodepool $(PROMETHEUS_NODEPOOL) with 1 node"
                  az aks nodepool add \
                    --resource-group $(clustername) \
                    --cluster-name $(clustername) \
                    --name $(PROMETHEUS_NODEPOOL) \
                    --node-count 1 \
                    --node-vm-size Standard_D48a_v4 \
                    --subscription $(TESTING_SUB) \
                    --os-type Linux \
                    --mode User \
                    --max-pods 250
                fi
                kubectl get nodes -owide

          - script: |
              set -ex
              echo "Labeling $(SECONDARY_NODEPOOL) nodes with slo=true"
              kubectl label nodes -l agentpool=$(SECONDARY_NODEPOOL) slo=true --overwrite
              echo "Labeling $(PROMETHEUS_NODEPOOL) nodes with prometheus=true"
              kubectl label nodes -l agentpool=$(PROMETHEUS_NODEPOOL) prometheus=true --overwrite
              echo "Verifying node labels"
              kubectl get nodes --show-labels
            displayName: "Label Nodes"

          - script: |
              set -ex
              PERF_TESTS_DIR=$(Agent.TempDirectory)/perf-tests
              git clone https://github.com/QxBytes/perf-tests.git "$PERF_TESTS_DIR"
              cd "$PERF_TESTS_DIR"
              git checkout alew/scale-test
              cd clusterloader2
              CL2_PROMETHEUS_SCRAPE_KUBE_PROXY=false \
              CL2_ENABLE_VIOLATIONS_FOR_API_CALL_PROMETHEUS_SIMPLE=false \
              ./run-podstartup.sh cil-test-results ~/.kube/config $(clustername) ${{ parameters.nodeCount }} 20
            displayName: "Run Perf Tests"
            continueOnError: true

          - script: |
              set -ex
              PERF_TESTS_DIR=$(Agent.TempDirectory)/perf-tests
              RESULTS_DIR="$PERF_TESTS_DIR/clusterloader2/results/cil-test-results"
              # Rename files containing ":" since publish artifacts does not support that character
              find "$RESULTS_DIR" -depth -name '*:*' | while read -r f; do
                dir="$(dirname "$f")"
                base="$(basename "$f")"
                mv "$f" "$dir/$(echo "$base" | sed 's/:/_/g')"
              done
              ARTIFACT_DIR="$(Build.ArtifactStagingDirectory)/cil-test-results"
              mkdir -p "$ARTIFACT_DIR"
              cp -r "$RESULTS_DIR"/* "$ARTIFACT_DIR"
            displayName: "Copy Perf Test Results"
            condition: always()

          - task: PublishBuildArtifacts@1
            inputs:
              artifactName: cil-test-results
              pathtoPublish: "$(Build.ArtifactStagingDirectory)/cil-test-results"
            condition: always()
            name: "PublishPerfTestResults"
            displayName: "Publish Perf Test Results"

  - stage: scaleDown
    displayName: "Scale Down - Nodepool"
    dependsOn: clusterLifecycle
    condition: succeededOrFailed()
    jobs:
      - job: scale_down
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
        timeoutInMinutes: 120
        steps:
          - task: AzureCLI@2
            displayName: "Scale Nodepool Down"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex

                make -C ./hack/aks set-kubeconf AZCLI=az CLUSTER=$(clustername)

                current_count=$(az aks nodepool show --resource-group $(clustername) --cluster-name $(clustername) --name $(SECONDARY_NODEPOOL) --subscription $(TESTING_SUB) --query count -o tsv)
                if [ "$current_count" -ne 2 ]; then
                  echo "Scaling nodepool back down to 2 nodes (currently $current_count)"
                  make -C ./hack/aks scale-nodes AZCLI=az CLUSTER=$(clustername) NODEPOOL=$(SECONDARY_NODEPOOL) NODE_COUNT=2
                else
                  echo "Nodepool already at 2 nodes, skipping scale down"
                fi
                kubectl get nodes -owide

  - stage: deleteNodepool
    displayName: "Delete Secondary Nodepool (Manual)"
    dependsOn: []
    condition: eq('${{ parameters.deleteNodepool }}', true)
    jobs:
      - job: delete_nodepool
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
        steps:
          - task: AzureCLI@2
            displayName: "Delete Nodepool $(SECONDARY_NODEPOOL)"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex
                echo "Deleting secondary nodepool $(SECONDARY_NODEPOOL) from cluster $(clustername)"
                az aks nodepool delete \
                  --resource-group $(clustername) \
                  --cluster-name $(clustername) \
                  --name $(SECONDARY_NODEPOOL) \
                  --subscription $(TESTING_SUB)
                echo "Nodepool $(SECONDARY_NODEPOOL) deleted successfully"

  - stage: deletePrometheusNodepool
    displayName: "Delete Prometheus Nodepool (Manual)"
    dependsOn: []
    condition: eq('${{ parameters.deletePrometheusNodepool }}', true)
    jobs:
      - job: delete_prometheus_nodepool
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
        steps:
          - task: AzureCLI@2
            displayName: "Delete Nodepool $(PROMETHEUS_NODEPOOL)"
            inputs:
              azureSubscription: $(TEST_SUB_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                set -ex
                echo "Deleting prometheus nodepool $(PROMETHEUS_NODEPOOL) from cluster $(clustername)"
                az aks nodepool delete \
                  --resource-group $(clustername) \
                  --cluster-name $(clustername) \
                  --name $(PROMETHEUS_NODEPOOL) \
                  --subscription $(TESTING_SUB)
                echo "Nodepool $(PROMETHEUS_NODEPOOL) deleted successfully"
