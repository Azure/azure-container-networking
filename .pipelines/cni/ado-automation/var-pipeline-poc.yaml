pr: none
trigger: none

stages:
  - stage: setup
    displayName: Variable Group POC
    jobs:
      - job: vgroup
        displayName: View Variable Group
        pool:
          name: "$(BUILD_POOL_NAME_DEFAULT)"
        steps:
          - bash: |
              echo $(System.TeamFoundationCollectionUri)
              echo $(System.TeamProject)
            name: BuildCiliumImage
            displayName: "Build Cilium Image"

          - bash: az devops configure --defaults organization='$(System.TeamFoundationCollectionUri)' project='$(System.TeamProject)' --use-git-aliases true
            displayName: 'Set default Azure DevOps organization and project'

          - task: AzureCLI@2
            inputs:
              azureSubscription: $(BUILD_VALIDATIONS_SERVICE_CONNECTION)
              scriptLocation: "inlineScript"
              scriptType: "bash"
              addSpnToEnvironment: true
              inlineScript: |
                az account get-access-token \
                  --resource 499b84ac-1321-427f-aa17-267ca6975798 \
                  --query "accessToken" \
                  -o tsv

                az devops login
                az pipelines variable-group show --id $(CNI_VAR_GROUP)

            displayName: "Restart Nodes"
            condition: always()


  - stage: init
    displayName: "Build and Push Cilium Image"
    jobs:
      - job: build_and_push_cilium_image
        pool:
          name: $(BUILD_POOL_NAME_DEFAULT)
        steps:
          - bash: |
              echo hi
            name: BuildCiliumImage
            displayName: "Build Cilium Image"
