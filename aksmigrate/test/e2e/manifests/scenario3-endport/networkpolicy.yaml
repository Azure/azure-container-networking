apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-db-port-range
  namespace: e2e-endport
spec:
  podSelector:
    matchLabels:
      app: db-client
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
          endPort: 5440
