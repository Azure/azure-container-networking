apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-target-8080
  namespace: e2e-namedports
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-target
      variant: port-8080
  template:
    metadata:
      labels:
        app: svc-target
        variant: port-8080
    spec:
      containers:
        - name: server
          image: nginx:1.25-alpine
          ports:
            - name: http
              containerPort: 8080
