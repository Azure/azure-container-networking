apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: e2e-host-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: busybox
          image: busybox:1.36
          command: ["sleep", "3600"]
