apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-ipblock-catch-all
  namespace: e2e-ipblock
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
