apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Service that exposes pods selected by deny-all
apiVersion: v1
kind: Service
metadata:
  name: web-lb
  namespace: production
spec:
  type: LoadBalancer
  selector:
    app: web-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  externalTrafficPolicy: Cluster
---
apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: production
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Pod
metadata:
  name: web-frontend-1
  namespace: production
  labels:
    app: web-frontend
spec:
  containers:
    - name: web
      image: nginx:latest
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: api-gateway-1
  namespace: production
  labels:
    app: api-gateway
spec:
  containers:
    - name: api
      image: api:latest
      ports:
        - containerPort: 8080
