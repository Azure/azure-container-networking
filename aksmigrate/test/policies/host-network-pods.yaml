apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitor-agent-policy
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app: node-exporter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 9100
---
apiVersion: v1
kind: Pod
metadata:
  name: node-exporter-abc
  namespace: monitoring
  labels:
    app: node-exporter
spec:
  hostNetwork: true
  containers:
    - name: node-exporter
      image: prom/node-exporter:latest
      ports:
        - containerPort: 9100
---
apiVersion: v1
kind: Pod
metadata:
  name: prometheus-0
  namespace: monitoring
  labels:
    app: prometheus
spec:
  containers:
    - name: prometheus
      image: prom/prometheus:latest
      ports:
        - containerPort: 9090
