apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: complex-selector-policy
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: api-server
    matchExpressions:
      - key: tier
        operator: In
        values: ["backend", "middleware"]
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              environment: production
          podSelector:
            matchLabels:
              role: frontend
      ports:
        - protocol: TCP
          port: 443
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: team
                operator: In
                values: ["platform", "sre"]
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
            except:
              - 10.0.1.0/24
      ports:
        - protocol: TCP
          port: 443
---
# Service mesh scenario: Istio sidecar present
apiVersion: v1
kind: Pod
metadata:
  name: api-server-1
  namespace: production
  labels:
    app: api-server
    tier: backend
    version: v2
spec:
  containers:
    - name: api
      image: api-server:v2
      ports:
        - containerPort: 8080
        - containerPort: 443
    - name: istio-proxy
      image: docker.io/istio/proxyv2:1.20.0
      ports:
        - containerPort: 15090
---
# Spark job pods with high-churn labels
apiVersion: v1
kind: Pod
metadata:
  name: spark-driver-job-12345
  namespace: data-processing
  labels:
    app: spark
    spark-app-name: etl-daily-20260223
    spark-role: driver
    job-name: etl-daily-20260223
spec:
  containers:
    - name: spark
      image: spark:3.5
---
apiVersion: v1
kind: Pod
metadata:
  name: spark-executor-job-12345-0
  namespace: data-processing
  labels:
    app: spark
    spark-app-name: etl-daily-20260223
    spark-role: executor
    spark-app-selector: spark-abc123
    job-name: etl-daily-20260223
spec:
  containers:
    - name: spark
      image: spark:3.5
