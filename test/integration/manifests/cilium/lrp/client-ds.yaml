apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lrp-test${POOL}
  namespace: default
spec:
  selector:
    matchLabels:
      lrp-test: "true"
  template:
    metadata:
      labels:
        lrp-test: "true"
    spec:
      # Optional per-pool node selector. Rendered to "{}" (no constraint) unless
      # POOL_NODESELECTOR is set (e.g. "agentpool: pool1").
      nodeSelector: {${POOL_NODESELECTOR}}
      containers:
        - name: no-op
          command: ["sleep","3600"]
          image: mcr.microsoft.com/cbl-mariner/busybox:2.0
          imagePullPolicy: Always
