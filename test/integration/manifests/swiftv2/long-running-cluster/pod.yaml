apiVersion: v1
kind: Pod
metadata:
  name: {{ .PodName }}
  namespace: {{ .Namespace }}
  labels:
    kubernetes.azure.com/pod-network-instance: {{ .PNIName }}
    kubernetes.azure.com/pod-network: {{ .PNName }}
spec:
  nodeSelector:
    kubernetes.io/hostname: {{ .NodeName }}
  containers:
  - name: net-debugger
    image: {{ .Image }}
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Pod Network Diagnostics started on $(hostname)";
        echo "Starting HTTP server on port 8080";
        
        # Create a simple index.html with pod info
        mkdir -p /tmp/www
        cat > /tmp/www/index.html <<EOF
        <html><body>
        <h1>Pod: $(hostname)</h1>
        <p>IP: $(hostname -i)</p>
        <p>Time: $(date)</p>
        </body></html>
        EOF
        
        # Start HTTP server in background
        cd /tmp/www && python3 -m http.server 8080 &
        
        # Keep showing network info
        while true; do
          echo "=== Network Status at $(date) ==="
          ip addr show
          ip route show
          sleep 60
        done
    ports:
    - containerPort: 8080
      protocol: TCP
    resources:
      limits:
        cpu: 300m
        memory: 600Mi
      requests:
        cpu: 300m
        memory: 600Mi
    securityContext:
      privileged: true
  restartPolicy: Always
