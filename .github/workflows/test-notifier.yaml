# TEMPORARY: Test workflow for acn-notifier-bot integration
# Delete this file before merging the PR
name: Test Notifier Bot

on:
  push:
    branches:
      - behzadm/scheduled-release-workflow
    paths:
      - .github/workflows/test-notifier.yaml

permissions:
  id-token: write
  contents: read

env:
  NOTIFIER_URL: https://acn-notifier-bot.azurewebsites.net
  NOTIFIER_AUDIENCE: api://3976eca5-3f9d-4528-987f-c20c1f9f27f7
  TEAMS_TEAM_ID: 1eb27b57-8ace-4f0e-a9a9-e6db4e9829b7
  TEAMS_CNI_CHANNEL_ID: "19:2b104ee19fdb450b807903eb7c79588a@thread.skype"
  TEAMS_RELEASE_CHANNEL_ID: "19:ad6cb6596adf4850910e9be3e8a7f9ab@thread.skype"

jobs:
  test_notifier:
    name: Test Teams Notification
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3
        with:
          client-id: 75013c7b-3bea-441b-952c-e13d7c9247bc
          tenant-id: 72f988bf-86f1-41af-91ab-2d7cd011db47
          allow-no-subscriptions: true

      - name: Get token and send test notification
        run: |
          set -euo pipefail

          TOKEN=$(az account get-access-token --resource "$NOTIFIER_AUDIENCE" --query accessToken -o tsv)
          echo "✅ Token acquired (length: ${#TOKEN})"

          echo "Sending test notification to CNI channel..."
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST "${NOTIFIER_URL}/api/notifications" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg teamId "$TEAMS_TEAM_ID" \
              --arg channelId "$TEAMS_CNI_CHANNEL_ID" \
              --arg runId "scheduled-release-test-$GITHUB_RUN_ID" \
              --arg source "scheduled-release" \
              --arg title "🧪 Test: Scheduled Release v1.7.22" \
              --arg status "running" \
              --arg stage "dependabot-gate" \
              --arg summary "Testing notifier bot integration from GitHub Actions (PR #4410)" \
              '{source: $source, runId: $runId, teamId: $teamId, channelId: $channelId, title: $title, status: $status, stage: $stage, summary: $summary}')")

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/response.json
          echo ""

          if [[ "$HTTP_CODE" -ge 400 ]]; then
            echo "❌ Failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Notification sent to Teams!"

          # Test reply
          echo "Sending threaded reply..."
          REPLY_CODE=$(curl -s -o /tmp/reply.json -w "%{http_code}" -X POST "${NOTIFIER_URL}/api/notifications/reply" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg source "scheduled-release" \
              --arg runId "scheduled-release-test-$GITHUB_RUN_ID" \
              --arg text "📋 This is a threaded reply test. R2D drafts and follow-up messages will appear here." \
              --arg tag "r2d-draft" \
              --arg severity "info" \
              '{source: $source, runId: $runId, text: $text, tag: $tag, severity: $severity}')")

          echo "Reply HTTP: $REPLY_CODE"
          cat /tmp/reply.json
          echo ""

          # Test update to succeeded
          echo "Updating card to succeeded..."
          HTTP_CODE=$(curl -s -o /tmp/response2.json -w "%{http_code}" -X POST "${NOTIFIER_URL}/api/notifications" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg teamId "$TEAMS_TEAM_ID" \
              --arg channelId "$TEAMS_CNI_CHANNEL_ID" \
              --arg runId "scheduled-release-test-$GITHUB_RUN_ID" \
              --arg source "scheduled-release" \
              --arg title "🧪 Test: Scheduled Release v1.7.22" \
              --arg status "succeeded" \
              --arg stage "complete" \
              --arg summary "All checks passed! Notifier bot integration verified." \
              '{source: $source, runId: $runId, teamId: $teamId, channelId: $channelId, title: $title, status: $status, stage: $stage, summary: $summary}')")

          echo "Update HTTP: $HTTP_CODE"
          cat /tmp/response2.json
          echo ""
          echo "✅ Done! Check the CNI Teams channel."
