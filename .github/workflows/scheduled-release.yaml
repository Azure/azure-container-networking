# Automated 3-Week Release Orchestrator for ACN
# Handles: dependabot PR collection, vuln checks, tag creation, pipeline validation,
# release channel posting, and R2D draft preparation.
#
# Trigger: Every 3rd Friday at 14:00 UTC + manual dispatch
#
# ─── Teams Notification Dependency ───────────────────────────────────────────
# Teams messages are sent via Azure Logic Apps with OAuth-based API connections.
# The connection can lose access if:
#   1. The authorizing user's password is reset or account is disabled
#   2. An Azure AD admin revokes consent or applies a conditional access policy
#   3. The connection is unused for 90+ days (refresh token expiry)
# If Teams notifications stop working, see the internal wiki for re-authorization
# steps, or run the re-auth script in the repo's /tools/release/ directory.
# Contact: ACN Release Engineering team
# ─────────────────────────────────────────────────────────────────────────────
name: Scheduled Release

on:
  schedule:
    # Every Friday at 14:00 UTC — workflow checks if it's a 3-week cycle
    - cron: "0 14 * * 5"
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Release branch to target"
        required: true
        default: "release/v1.7"
        type: choice
        options:
          - release/v1.7
          - master
      skip_dependabot_wait:
        description: "Skip waiting for dependabot PRs to merge"
        required: false
        default: false
        type: boolean
      skip_vuln_check:
        description: "Skip govulncheck gate"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run — post to Teams but skip actual tag creation and pipeline triggers"
        required: false
        default: false
        type: boolean

concurrency:
  group: scheduled-release-${{ inputs.release_branch || 'release/v1.7' }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

env:
  RELEASE_BRANCH: ${{ inputs.release_branch || 'release/v1.7' }}
  MAX_PIPELINE_RETRIES: 5

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: Check if this is a 3-week cycle (for cron trigger only)
  # ─────────────────────────────────────────────────────────────────────────────
  check_cadence:
    name: Check 3-Week Cadence
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Determine if this is a release week
        id: check
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Calculate week number since epoch, check divisibility by 3
          # Epoch anchor: 2024-01-05 (a Friday) = week 0
          EPOCH_FRIDAY=1704412800  # 2024-01-05 00:00:00 UTC
          NOW=$(date +%s)
          WEEKS_SINCE=$(( (NOW - EPOCH_FRIDAY) / 604800 ))
          if (( WEEKS_SINCE % 3 == 0 )); then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Release week detected (week $WEEKS_SINCE since anchor)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not a release week (week $WEEKS_SINCE since anchor). Skipping."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1: Collect and wait for Dependabot PRs
  # ─────────────────────────────────────────────────────────────────────────────
  wait_dependabot:
    name: "Step 1: Wait for Dependabot PRs"
    runs-on: ubuntu-latest
    needs: check_cadence
    if: needs.check_cadence.outputs.should_run == 'true'
    permissions:
      contents: read
      pull-requests: read
      issues: write
    outputs:
      merged_count: ${{ steps.wait.outputs.merged_count || steps.skip.outputs.merged_count }}
      skipped_prs: ${{ steps.wait.outputs.skipped_prs }}
      tracking_issue: ${{ steps.create_issue.outputs.issue_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Collect pending dependabot PRs, Go upgrade PRs, and upcoming tags
        id: collect
        if: ${{ inputs.skip_dependabot_wait != true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${RELEASE_BRANCH}"

          # Get open dependabot PRs
          DEPENDABOT_PRS=$(gh pr list --repo "$REPO" --base "$BRANCH" \
            --author "app/dependabot" --state open \
            --json number,title,url --jq '.')

          # Get open Go upgrade PRs (created by the Go version digest workflow)
          # These PRs typically have "go" and "upgrade"/"bump" in the title or
          # come from branches matching common Go upgrade patterns
          GO_UPGRADE_PRS=$(gh pr list --repo "$REPO" --base "$BRANCH" \
            --state open --json number,title,url,headRefName,labels --jq '
            [.[] | select(
              (.title | test("(?i)go.*(upgrade|bump|version|1\\.[0-9]+)")) or
              (.headRefName | test("(?i)go.*(bump|upgrade|version|minor)")) or
              (any(.labels[]?.name; test("(?i)go-upgrade")))
            )]')

          # Merge both lists, deduplicating by PR number
          OPEN_PRS_JSON=$(echo "$DEPENDABOT_PRS $GO_UPGRADE_PRS" | jq -s '
            .[0] + .[1] | unique_by(.number)')
          echo "open_prs_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OPEN_PRS_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          OPEN_COUNT=$(echo "$OPEN_PRS_JSON" | jq 'length')
          DEPENDABOT_COUNT=$(echo "$DEPENDABOT_PRS" | jq 'length')
          GO_UPGRADE_COUNT=$(echo "$GO_UPGRADE_PRS" | jq 'length')
          echo "open_count=$OPEN_COUNT" >> "$GITHUB_OUTPUT"
          echo "dependabot_count=$DEPENDABOT_COUNT" >> "$GITHUB_OUTPUT"
          echo "go_upgrade_count=$GO_UPGRADE_COUNT" >> "$GITHUB_OUTPUT"

          # Determine upcoming main tag
          if [[ "$BRANCH" == "master" ]]; then
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          else
            VERSION_PREFIX=$(echo "$BRANCH" | sed 's|release/||')
            LATEST_TAG=$(git tag -l "${VERSION_PREFIX}.*" --sort=-v:refname | head -1)
          fi
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Detect binary tags that will be produced
          BINARIES="dropgz azure-ipam azure-iptables-monitor azure-ip-masq-merger cilium-log-collector"
          BINARY_TAGS=""
          for BIN in $BINARIES; do
            BIN_LATEST=$(git tag --merged HEAD -l "${BIN}/v*" --sort=-v:refname | head -1)
            if [[ -n "$BIN_LATEST" ]]; then
              CHANGES=$(git diff --name-only "${BIN_LATEST}..HEAD" -- "${BIN}/" 2>/dev/null | wc -l)
              if [[ "$CHANGES" -gt 0 ]]; then
                BIN_VER=$(echo "$BIN_LATEST" | sed "s|${BIN}/v||")
                BIN_PATCH=$(echo "$BIN_VER" | cut -d. -f3)
                BIN_NEW="${BIN}/v$(echo "$BIN_VER" | cut -d. -f1).$(echo "$BIN_VER" | cut -d. -f2).$((BIN_PATCH + 1))"
                BINARY_TAGS+="• \`$BIN_NEW\`\n"
              fi
            fi
          done
          echo "binary_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BINARY_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Find or create release tracking issue
        id: create_issue
        if: ${{ inputs.skip_dependabot_wait != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.collect.outputs.new_tag }}
          OPEN_COUNT: ${{ steps.collect.outputs.open_count }}
          DEPENDABOT_COUNT: ${{ steps.collect.outputs.dependabot_count }}
          GO_UPGRADE_COUNT: ${{ steps.collect.outputs.go_upgrade_count }}
          OPEN_PRS_JSON: ${{ steps.collect.outputs.open_prs_json }}
          BINARY_TAGS: ${{ steps.collect.outputs.binary_tags }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"

          # Check if a tracking issue already exists for this tag (from a previous timed-out run)
          EXISTING_ISSUE=$(gh issue list --repo "$REPO" \
            --label "release-tracking" --state open \
            --search "Release Tracking: ${NEW_TAG}" \
            --json number,title --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [[ -n "$EXISTING_ISSUE" ]]; then
            echo "Found existing tracking issue #${EXISTING_ISSUE} — resuming"
            echo "issue_number=$EXISTING_ISSUE" >> "$GITHUB_OUTPUT"
            echo "issue_url=https://github.com/${REPO}/issues/${EXISTING_ISSUE}" >> "$GITHUB_OUTPUT"
            echo "resumed=true" >> "$GITHUB_OUTPUT"

            # Post a resume comment with updated PR state
            PR_LIST=""
            if [[ "$OPEN_COUNT" -gt 0 ]]; then
              PR_LIST=$(echo "$OPEN_PRS_JSON" | jq -r '.[] | "- [ ] #\(.number) — \(.title)"')
            fi

            gh issue comment "$EXISTING_ISSUE" --repo "$REPO" \
              --body "🔄 **Workflow re-triggered** (run [$RUN_ID]($SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$RUN_ID))

          Still pending (${OPEN_COUNT}):
          ${PR_LIST:-_None — all clear!_}

          Previous skip comments on this issue still apply." || true
            exit 0
          fi

          # Build PR list for the issue body
          PR_LIST=""
          if [[ "$OPEN_COUNT" -gt 0 ]]; then
            PR_LIST=$(echo "$OPEN_PRS_JSON" | jq -r '.[] | "- [ ] #\(.number) — \(.title)"')
          fi

          BODY="## 🚀 Release Cycle: ${NEW_TAG}

          **Branch:** \`${RELEASE_BRANCH}\`
          **Run:** ${SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}

          ### Tags to be created:
          • \`${NEW_TAG}\` (CNI/CNS/NPM)
          ${BINARY_TAGS}
          ### ⏳ Pending PRs — Dependabot (${DEPENDABOT_COUNT}) + Go Upgrade (${GO_UPGRADE_COUNT}):

          ${PR_LIST:-_None — all clear!_}

          ---
          ### Skip Instructions

          To skip a specific PR, comment on this issue:
          \`\`\`
          skip #<PR_NUMBER>
          \`\`\`

          To skip ALL remaining dependency PRs (dependabot + Go upgrade):
          \`\`\`
          skip all
          \`\`\`

          ### Pause for a non-dependabot PR

          To hold the release until a specific PR merges (any PR, not just dependabot):
          \`\`\`
          pause #<PR_NUMBER>
          \`\`\`

          To remove the hold:
          \`\`\`
          unpause #<PR_NUMBER>
          \`\`\`

          ### Pause the release entirely

          To freeze the release (e.g. waiting for an unrelated fix, discussion, etc.):
          \`\`\`
          pause
          \`\`\`

          To unfreeze and let it continue:
          \`\`\`
          resume
          \`\`\`

          ---
          _This issue is managed by the Scheduled Release workflow. It will close automatically when the release completes._"

          # Create the issue
          ISSUE_URL=$(gh issue create --repo "$REPO" \
            --title "🔄 Release Tracking: ${NEW_TAG}" \
            --body "$BODY" \
            --label "release-tracking" 2>&1)

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oP '\d+$')
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "resumed=false" >> "$GITHUB_OUTPUT"
          echo "Created tracking issue: $ISSUE_URL"

      - name: Post release announcement to CNI Teams channel
        if: ${{ inputs.skip_dependabot_wait != true }}
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_CNI_LOGIC_APP_URL }}
          NEW_TAG: ${{ steps.collect.outputs.new_tag }}
          OPEN_COUNT: ${{ steps.collect.outputs.open_count }}
          DEPENDABOT_COUNT: ${{ steps.collect.outputs.dependabot_count }}
          GO_UPGRADE_COUNT: ${{ steps.collect.outputs.go_upgrade_count }}
          OPEN_PRS_JSON: ${{ steps.collect.outputs.open_prs_json }}
          BINARY_TAGS: ${{ steps.collect.outputs.binary_tags }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
          RESUMED: ${{ steps.create_issue.outputs.resumed }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"

          # Build PR list in HTML
          PR_LIST_HTML=""
          if [[ "$OPEN_COUNT" -gt 0 ]]; then
            PR_LIST_HTML=$(echo "$OPEN_PRS_JSON" | jq -r '.[] | "• <a href=\"\(.url)\">#\(.number)</a> — \(.title)<br>"' | tr -d '\n')
          else
            PR_LIST_HTML="<i>None — all clear!</i>"
          fi

          BINARY_TAGS_HTML=$(echo -e "$BINARY_TAGS" | sed 's/$/<br>/g')

          if [[ "$RESUMED" == "true" ]]; then
            # Brief resume message — don't repeat the full announcement
            MSG="🔄 <b>Release workflow re-triggered for ${NEW_TAG}</b><br><br>\
            <b>Still pending (${OPEN_COUNT}):</b><br>\
            ${PR_LIST_HTML}<br><br>\
            Previous skip commands still apply. Tracking issue: \
            <a href=\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\">#${ISSUE_NUMBER}</a>"
          else
            # Full first-time announcement
            MSG="🚀 <b>Release cycle starting: ${NEW_TAG}</b><br><br>\
            <b>Tags to be created:</b><br>\
            • <code>${NEW_TAG}</code> (CNI/CNS/NPM)<br>\
            ${BINARY_TAGS_HTML}<br>\
            <b>Pending PRs — Dependabot (${DEPENDABOT_COUNT}) + Go Upgrade (${GO_UPGRADE_COUNT}):</b><br>\
            ${PR_LIST_HTML}<br><br>\
            ⚠️ These PRs must merge before the release proceeds.<br>\
            To skip a PR, comment <code>skip #NUMBER</code> on tracking issue \
            <a href=\"https://github.com/${REPO}/issues/${ISSUE_NUMBER}\">#${ISSUE_NUMBER}</a><br>\
            To skip all: comment <code>skip all</code>"
          fi

          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || echo "::warning::Failed to post to CNI Teams channel"

      - name: Wait for PRs to merge or be skipped
        id: wait
        if: ${{ inputs.skip_dependabot_wait != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${RELEASE_BRANCH}"
          POLL_INTERVAL=300  # 5 minutes

          # No artificial timeout — this job runs until all PRs merge or are
          # explicitly skipped via issue comments. If the GitHub Actions job-level
          # timeout (6h) is reached, the job FAILS and the user must re-trigger
          # after merging/skipping PRs. This is intentional: we don't silently
          # proceed with unmerged dependency updates.

          SKIPPED_PRS=""

          while true; do
            # Check for comments on the tracking issue
            COMMENTS=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
              --json comments --jq '.comments[].body' 2>/dev/null || echo "")

            # --- Handle bare "pause" / "resume" (no PR number) ---
            # A bare "pause" freezes the release entirely until someone comments "resume".
            # We count occurrences: if pause > resume, the release is frozen.
            PAUSE_BARE_COUNT=$(echo "$COMMENTS" | grep -ciP '^\s*pause\s*$' || true)
            RESUME_BARE_COUNT=$(echo "$COMMENTS" | grep -ciP '^\s*resume\s*$' || true)
            if (( PAUSE_BARE_COUNT > RESUME_BARE_COUNT )); then
              echo "⏸️ Release is paused. Waiting for 'resume' comment on issue #${ISSUE_NUMBER}..."
              sleep $POLL_INTERVAL
              continue
            fi

            # --- Handle "skip" commands ---
            SKIP_ALL=false
            if echo "$COMMENTS" | grep -qi "^skip all$"; then
              SKIP_ALL=true
              echo "Received 'skip all' — proceeding without waiting for remaining PRs."
            fi
            SKIP_NUMBERS=$(echo "$COMMENTS" | grep -ioP 'skip\s+#\K\d+' | sort -u || true)

            # --- Handle "pause #PR" commands ---
            # Users can comment "pause #1234" to block the release until that PR merges.
            # Comment "unpause #1234" or "resume #1234" to remove the hold.
            PAUSE_NUMBERS=$(echo "$COMMENTS" | grep -ioP 'pause\s+#\K\d+' | sort -u || true)
            UNPAUSE_NUMBERS=$(echo "$COMMENTS" | grep -ioP '(?:unpause|resume)\s+#\K\d+' | sort -u || true)

            # Effective pauses = pause commands minus unpause commands
            ACTIVE_PAUSES=""
            BLOCKED_LIST=""
            for PR_NUM in $PAUSE_NUMBERS; do
              if ! echo "$UNPAUSE_NUMBERS" | grep -qx "$PR_NUM"; then
                # Check if this PR is still open (not yet merged)
                PR_STATE=$(gh pr view "$PR_NUM" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
                if [[ "$PR_STATE" == "OPEN" ]]; then
                  ACTIVE_PAUSES="${ACTIVE_PAUSES:+$ACTIVE_PAUSES }$PR_NUM"
                  PR_TITLE=$(gh pr view "$PR_NUM" --repo "$REPO" --json title --jq '.title' 2>/dev/null || echo "")
                  BLOCKED_LIST+="  ⏸️ #$PR_NUM — $PR_TITLE (pause hold)\n"
                fi
                # If MERGED or CLOSED, the pause is automatically satisfied
              fi
            done

            # --- Get currently open dependabot + Go upgrade PRs ---
            DEPENDABOT_PRS=$(gh pr list --repo "$REPO" --base "$BRANCH" \
              --author "app/dependabot" --state open \
              --json number,title --jq '.')
            GO_UPGRADE_PRS=$(gh pr list --repo "$REPO" --base "$BRANCH" \
              --state open --json number,title,headRefName,labels --jq '
              [.[] | select(
                (.title | test("(?i)go.*(upgrade|bump|version|1\\.[0-9]+)")) or
                (.headRefName | test("(?i)go.*(bump|upgrade|version|minor)")) or
                (any(.labels[]?.name; test("(?i)go-upgrade")))
              )]')
            OPEN_PRS=$(echo "$DEPENDABOT_PRS $GO_UPGRADE_PRS" | jq -s '
              .[0] + .[1] | unique_by(.number)')
            OPEN_COUNT=$(echo "$OPEN_PRS" | jq 'length')

            if [[ "$SKIP_ALL" == "true" ]]; then
              REMAINING=$(echo "$OPEN_PRS" | jq -r '.[].number' | tr '\n' ',' | sed 's/,$//')
              SKIPPED_PRS="${SKIPPED_PRS:+$SKIPPED_PRS,}$REMAINING"
              # skip all does NOT override pause holds
              if [[ -z "$ACTIVE_PAUSES" ]]; then
                break
              fi
              echo "skip all received, but pause holds still active: $ACTIVE_PAUSES"
            fi

            # Filter out skipped dependabot PRs
            WAITING_COUNT=0
            WAITING_LIST=""
            if [[ "$SKIP_ALL" != "true" ]]; then
              while IFS= read -r PR_LINE; do
                PR_NUM=$(echo "$PR_LINE" | jq -r '.number')
                PR_TITLE=$(echo "$PR_LINE" | jq -r '.title')
                if echo "$SKIP_NUMBERS" | grep -qx "$PR_NUM"; then
                  SKIPPED_PRS="${SKIPPED_PRS:+$SKIPPED_PRS,}$PR_NUM"
                else
                  WAITING_COUNT=$((WAITING_COUNT + 1))
                  WAITING_LIST+="  #$PR_NUM — $PR_TITLE\n"
                fi
              done < <(echo "$OPEN_PRS" | jq -c '.[]')
            fi

            # Check if we can proceed
            TOTAL_BLOCKING=$((WAITING_COUNT + $(echo "$ACTIVE_PAUSES" | wc -w)))
            if [[ "$TOTAL_BLOCKING" -eq 0 ]]; then
              echo "All dependabot PRs merged/skipped and no active pause holds."
              break
            fi

            echo "Blocked on $TOTAL_BLOCKING item(s):"
            if [[ "$WAITING_COUNT" -gt 0 ]]; then
              echo "  Dependabot PRs:"
              echo -e "$WAITING_LIST"
            fi
            if [[ -n "$ACTIVE_PAUSES" ]]; then
              echo "  Pause holds:"
              echo -e "$BLOCKED_LIST"
            fi

            sleep $POLL_INTERVAL
          done

          # Count merged dependabot PRs (last 7 days)
          MERGED=$(gh pr list --repo "$REPO" --base "$BRANCH" \
            --author "app/dependabot" --state merged \
            --json mergedAt --jq '[.[] | select(.mergedAt > (now - 604800 | todate))] | length' 2>/dev/null || echo "0")
          echo "merged_count=${MERGED}" >> "$GITHUB_OUTPUT"
          echo "skipped_prs=${SKIPPED_PRS}" >> "$GITHUB_OUTPUT"

          # Update the tracking issue
          SUMMARY="✅ **Dependabot gate passed.** Merged: ${MERGED}"
          if [[ -n "$SKIPPED_PRS" ]]; then
            SUMMARY+=" | Skipped: ${SKIPPED_PRS}"
          fi
          if [[ -n "$PAUSE_NUMBERS" ]]; then
            SUMMARY+=" | Pause holds satisfied: ${PAUSE_NUMBERS}"
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$SUMMARY" || true

      - name: Post update to CNI channel
        if: ${{ inputs.skip_dependabot_wait != true && steps.wait.outcome == 'success' }}
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_CNI_LOGIC_APP_URL }}
          MERGED: ${{ steps.wait.outputs.merged_count }}
          SKIPPED: ${{ steps.wait.outputs.skipped_prs }}
          NEW_TAG: ${{ steps.collect.outputs.new_tag }}
        run: |
          if [[ -n "$SKIPPED" ]]; then
            MSG="✅ <b>Dependabot gate passed for ${NEW_TAG}</b><br>Merged: ${MERGED} | Skipped: ${SKIPPED}<br>Proceeding to vulnerability check..."
          else
            MSG="✅ <b>All dependabot PRs merged for ${NEW_TAG}</b><br>Total merged: ${MERGED}<br>Proceeding to vulnerability check..."
          fi

          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || true

      - name: Skip dependabot wait (manual override)
        id: skip
        if: ${{ inputs.skip_dependabot_wait == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "merged_count=0" >> "$GITHUB_OUTPUT"
          echo "Skipped dependabot wait per user request"

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2: Vulnerability Gate Check
  # ─────────────────────────────────────────────────────────────────────────────
  vuln_check:
    name: "Step 2: Vulnerability Gate"
    runs-on: ubuntu-latest
    needs: wait_dependabot
    if: ${{ inputs.skip_vuln_check != true }}
    outputs:
      vuln_count: ${{ steps.scan.outputs.vuln_count }}
      clean: ${{ steps.scan.outputs.clean }}
    steps:
      - name: Checkout release branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck on all modules
        id: scan
        run: |
          set -euo pipefail
          VULN_COUNT=0
          VULN_REPORT=""
          SCAN_ERRORS=0

          for moddir in $(find . -name "go.mod" -not -path "*/vendor/*" -exec dirname {} \;); do
            echo "Scanning $moddir..."
            if OUTPUT=$(cd "$moddir" && govulncheck ./... 2>&1); then
              echo "  ✅ $moddir: clean"
            else
              EXIT_CODE=$?
              FOUND=$(echo "$OUTPUT" | grep -c "Vulnerability" || true)
              if [[ "$FOUND" -gt 0 ]]; then
                VULN_COUNT=$((VULN_COUNT + FOUND))
                VULN_REPORT+="$moddir: $FOUND vulnerabilities found\n"
              else
                # govulncheck failed but no vulnerabilities reported — build/tooling error
                SCAN_ERRORS=$((SCAN_ERRORS + 1))
                VULN_REPORT+="$moddir: scan error (exit $EXIT_CODE, no vulns reported)\n"
                echo "::error::govulncheck failed in $moddir (exit $EXIT_CODE) without reporting vulnerabilities — possible build error"
              fi
            fi
          done

          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"
          echo "scan_errors=$SCAN_ERRORS" >> "$GITHUB_OUTPUT"
          if [[ "$VULN_COUNT" -eq 0 && "$SCAN_ERRORS" -eq 0 ]]; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            echo "✅ No vulnerabilities found"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            echo "::error::Found $VULN_COUNT vulnerabilities and $SCAN_ERRORS scan errors"
            echo -e "$VULN_REPORT"
            exit 1
          fi

      - name: Post vuln results to Teams
        if: failure() && steps.scan.outputs.vuln_count != ''
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_LOGIC_APP_URL }}
          VULN_COUNT: ${{ steps.scan.outputs.vuln_count }}
          SCAN_ERRORS: ${{ steps.scan.outputs.scan_errors }}
        run: |
          MSG="🚫 <b>govulncheck FAILED</b> on $RELEASE_BRANCH. Vulnerabilities: ${VULN_COUNT}, Scan errors: ${SCAN_ERRORS}. Release blocked until resolved."

          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || true

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2b: Detect Binary Changes (dropgz, azure-ipam, etc.)
  # ─────────────────────────────────────────────────────────────────────────────
  detect_binary_changes:
    name: "Step 2b: Detect Binary Changes"
    runs-on: ubuntu-latest
    needs: [wait_dependabot, vuln_check]
    if: always() && needs.wait_dependabot.result == 'success' && (needs.vuln_check.result == 'success' || needs.vuln_check.result == 'skipped')
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changes per binary
        id: detect
        run: |
          set -euo pipefail

          # Binaries to check: name matches both tag prefix and directory
          BINARIES="dropgz azure-ipam azure-iptables-monitor azure-ip-masq-merger cilium-log-collector"

          # Shared paths that affect all binaries (build infra changes)
          SHARED_PATHS="Makefile build/"

          MATRIX="[]"
          for BIN in $BINARIES; do
            # Find latest tag for this binary reachable from current branch
            LATEST_TAG=$(git tag --merged HEAD -l "${BIN}/v*" --sort=-v:refname | head -1)

            if [[ -z "$LATEST_TAG" ]]; then
              echo "::warning::No existing tag found for $BIN — skipping"
              continue
            fi

            # Check for changes in the binary's directory + shared build paths
            CHANGES=$(git diff --name-only "${LATEST_TAG}..HEAD" -- "${BIN}/" $SHARED_PATHS 2>/dev/null | wc -l)

            if [[ "$CHANGES" -gt 0 ]]; then
              # Parse current version from latest tag
              VERSION=$(echo "$LATEST_TAG" | sed "s|${BIN}/v||")
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              NEW_PATCH=$((PATCH + 1))
              NEW_TAG="${BIN}/v${MAJOR}.${MINOR}.${NEW_PATCH}"

              echo "  $BIN: $CHANGES file(s) changed since $LATEST_TAG → will tag $NEW_TAG"
              MATRIX=$(echo "$MATRIX" | jq -c --arg bin "$BIN" --arg tag "$NEW_TAG" --arg prev "$LATEST_TAG" \
                '. += [{"binary": $bin, "new_tag": $tag, "previous_tag": $prev}]')
            else
              echo "  $BIN: no changes since $LATEST_TAG — skipping"
            fi
          done

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [[ "$MATRIX" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No binaries need a release this cycle."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Binaries to release: $(echo "$MATRIX" | jq -r '.[].binary' | tr '\n' ' ')"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2c: Tag Binaries That Have Changes
  # NOTE: Binary tags (dropgz, azure-ipam, etc.) are pushed directly without the
  # tag-approval environment gate. This is intentional — these are smaller utility
  # binaries that don't go through managed DALEC, and the release workflow itself
  # already provides the gating (vuln check + dependabot gate + manual dispatch).
  # ─────────────────────────────────────────────────────────────────────────────
  tag_binaries:
    name: "Tag ${{ matrix.binary }}"
    runs-on: ubuntu-latest
    needs: detect_binary_changes
    if: needs.detect_binary_changes.outputs.has_changes == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect_binary_changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create tag ${{ matrix.new_tag }}
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ matrix.new_tag }}
          PREV_TAG: ${{ matrix.previous_tag }}
          BINARY: ${{ matrix.binary }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # Verify tag doesn't already exist (race guard)
          if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
            echo "::warning::Tag $NEW_TAG already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGET_SHA=$(git rev-parse HEAD)

          # Show changelog summary
          echo "Changes since $PREV_TAG:"
          git log --oneline "${PREV_TAG}..HEAD" -- "${BINARY}/" | head -20

          # Create and push tag
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🏜️ DRY RUN: Would create and push tag $NEW_TAG at $TARGET_SHA"
            echo "created=dry_run" >> "$GITHUB_OUTPUT"
          else
            TARGET_SHA=$(git rev-parse HEAD)
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/$NEW_TAG" \
              -f sha="$TARGET_SHA" --silent
            echo "✅ Created and pushed tag: $NEW_TAG"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2d: Post Binary Release Summary
  # ─────────────────────────────────────────────────────────────────────────────
  binary_release_summary:
    name: "Binary Release Summary"
    runs-on: ubuntu-latest
    needs: [detect_binary_changes, tag_binaries]
    if: always() && needs.detect_binary_changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout (for tag verification)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify created tags and post summary
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_LOGIC_APP_URL }}
          MATRIX: ${{ needs.detect_binary_changes.outputs.matrix }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          CREATED=""
          FAILED=""

          if [[ "$DRY_RUN" == "true" ]]; then
            # In dry run, list all intended tags (none were actually pushed)
            CREATED=$(echo "$MATRIX" | jq -r '.[].new_tag' | sed 's/^/• /' | tr '\n' '\n')
            MSG="🏜️ [DRY RUN] <b>Binary releases that WOULD be created:</b><br><br>${CREATED}<br><br>These tags were detected as needing a release but were not pushed (dry run mode)."

            curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || echo "::warning::Failed to post binary summary"
          else
            for TAG in $(echo "$MATRIX" | jq -r '.[].new_tag'); do
              if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                CREATED+="• $TAG\n"
              else
                FAILED+="• $TAG (not found)\n"
              fi
            done

            if [[ -n "$CREATED" ]]; then
              MSG="📦 <b>Binary releases created (3-week cycle):</b><br><br>$(echo -e "$CREATED")<br>These tags were auto-created because changes were detected since the previous release."

              curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || echo "::warning::Failed to post binary summary"
            fi

            if [[ -n "$FAILED" ]]; then
              echo "::warning::Some binary tags were not created:"
              echo -e "$FAILED"
            fi
          fi

      - name: Write binary summary to step summary
        env:
          MATRIX: ${{ needs.detect_binary_changes.outputs.matrix }}
        run: |
          {
            echo "## 📦 Binary Releases"
            echo ""
            echo "| Binary | New Tag | Previous Tag |"
            echo "|--------|---------|--------------|"
            echo "$MATRIX" | jq -r '.[] | "| \(.binary) | \(.new_tag) | \(.previous_tag) |"'
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 3: Determine Next Version & Trigger Tag Creation
  # ─────────────────────────────────────────────────────────────────────────────
  create_tag:
    name: "Step 3: Determine Version & Create Tag"
    runs-on: ubuntu-latest
    needs: [wait_dependabot, vuln_check]
    if: always() && needs.wait_dependabot.result == 'success' && (needs.vuln_check.result == 'success' || needs.vuln_check.result == 'skipped')
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
      target_sha: ${{ steps.version.outputs.target_sha }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine next patch version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get latest tag on this branch
          BRANCH="${RELEASE_BRANCH}"

          # Extract version prefix from branch name (e.g., release/v1.7 → v1.7)
          if [[ "$BRANCH" == "master" ]]; then
            # For master, find the latest root tag
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          else
            VERSION_PREFIX=$(echo "$BRANCH" | sed 's|release/||')
            LATEST_TAG=$(git tag -l "${VERSION_PREFIX}.*" --sort=-v:refname | head -1)
          fi

          if [[ -z "$LATEST_TAG" ]]; then
            echo "::error::No existing tag found for branch $BRANCH"
            exit 1
          fi

          echo "Latest tag: $LATEST_TAG"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Bump patch version
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "New tag will be: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          # Get HEAD SHA of release branch
          TARGET_SHA=$(git rev-parse HEAD)
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "Target SHA: $TARGET_SHA"

      - name: Dispatch create-release-tag workflow
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          TARGET_SHA: ${{ steps.version.outputs.target_sha }}
          VULN_COUNT: ${{ needs.vuln_check.outputs.vuln_count || '0' }}
          MERGED_COUNT: ${{ needs.wait_dependabot.outputs.merged_count || '0' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          REASON="Scheduled 3-week release. Dependabot PRs merged: ${MERGED_COUNT}. CVEs patched: ${VULN_COUNT}."

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🏜️ DRY RUN: Would dispatch create-release-tag for $NEW_TAG on $TARGET_SHA"
            echo "Reason: $REASON"
          else
            echo "Dispatching create-release-tag for $NEW_TAG on $TARGET_SHA"

            gh workflow run create-release-tag.yml \
              --repo "${GITHUB_REPOSITORY}" \
              -f tag_prefix=none \
              -f tag_name="$NEW_TAG" \
              -f target_sha="$TARGET_SHA" \
              -f reason="$REASON"

            echo "✅ Tag creation dispatched. Requires tag-approval environment approval."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 4: Pipeline Validation (ACN PR Pipeline + CNI Release Test)
  # ─────────────────────────────────────────────────────────────────────────────
  validate_pipelines:
    name: "Step 4: Pipeline Validation"
    runs-on: ubuntu-latest
    needs: create_tag
    if: inputs.dry_run != true
    timeout-minutes: 360
    permissions:
      actions: write
    outputs:
      pr_pipeline_run_url: ${{ steps.pr_pipeline.outputs.run_url }}
      cni_release_run_url: ${{ steps.cni_release.outputs.run_url }}
    steps:
      - name: Checkout (needed for git ls-remote)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 1
          persist-credentials: false

      - name: Wait for tag to be created
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          echo "Waiting for tag $NEW_TAG to appear (requires human approval)..."

          MAX_WAIT=7200  # 2 hours
          POLL=60
          elapsed=0
          while true; do
            if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
              echo "✅ Tag $NEW_TAG found"
              break
            fi
            if (( elapsed >= MAX_WAIT )); then
              echo "::error::Tag $NEW_TAG not created within ${MAX_WAIT}s. Approval may be pending."
              exit 1
            fi
            sleep $POLL
            elapsed=$((elapsed + POLL))
          done

      - name: Run ACN PR Pipeline (retry up to 5x)
        id: pr_pipeline
        env:
          GH_TOKEN: ${{ github.token }}
          # ADO pipeline trigger details — customize per environment
          ADO_ORG: ${{ secrets.AZURE_PIPELINE_ORG }}
          ADO_PROJECT: ${{ secrets.AZURE_PIPELINE_PROJECT }}
          ADO_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          ACN_PR_PIPELINE_ID: ${{ secrets.ACN_PR_PIPELINE_ID }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          MAX_RETRIES="${MAX_PIPELINE_RETRIES}"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "ACN PR Pipeline — Attempt $attempt/$MAX_RETRIES"

            # Trigger ADO pipeline (placeholder — replace with actual trigger mechanism)
            # This could be az pipelines run, REST API call, or GitHub workflow dispatch
            RUN_ID=$(curl -s -u ":${ADO_PAT}" \
              -H "Content-Type: application/json" \
              -d "{\"resources\":{\"repositories\":{\"self\":{\"refName\":\"refs/tags/${NEW_TAG}\"}}},\"templateParameters\":{\"tag\":\"${NEW_TAG}\"}}" \
              "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/pipelines/${ACN_PR_PIPELINE_ID}/runs?api-version=7.0" \
              | jq -r '.id' 2>/dev/null || echo "")

            if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
              echo "::warning::Failed to trigger ACN PR Pipeline (attempt $attempt)"
              if (( attempt == MAX_RETRIES )); then
                echo "::error::ACN PR Pipeline exhausted all $MAX_RETRIES retries"
                exit 1
              fi
              sleep 60
              continue
            fi

            RUN_URL="https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_build/results?buildId=${RUN_ID}&view=results"
            echo "Triggered run: $RUN_URL"

            # Poll for completion (max 90 minutes per run)
            poll_elapsed=0
            while true; do
              STATUS=$(curl -s -u ":${ADO_PAT}" \
                "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/build/builds/${RUN_ID}?api-version=7.0" \
                | jq -r '.status' 2>/dev/null || echo "unknown")

              RESULT=$(curl -s -u ":${ADO_PAT}" \
                "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/build/builds/${RUN_ID}?api-version=7.0" \
                | jq -r '.result' 2>/dev/null || echo "unknown")

              if [[ "$STATUS" == "completed" ]]; then
                if [[ "$RESULT" == "succeeded" ]]; then
                  echo "✅ ACN PR Pipeline succeeded (attempt $attempt)"
                  echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
                  exit 0
                else
                  echo "❌ ACN PR Pipeline failed with result: $RESULT (attempt $attempt)"
                  break
                fi
              fi
              poll_elapsed=$((poll_elapsed + 120))
              if (( poll_elapsed >= 5400 )); then
                echo "::warning::ACN PR Pipeline timed out after 90 minutes (attempt $attempt)"
                break
              fi
              sleep 120
            done

            if (( attempt == MAX_RETRIES )); then
              echo "::error::ACN PR Pipeline exhausted all $MAX_RETRIES retries"
              exit 1
            fi
            sleep 60
          done

      - name: Run ACN CNI Release Test (retry up to 5x)
        id: cni_release
        env:
          GH_TOKEN: ${{ github.token }}
          ADO_ORG: ${{ secrets.AZURE_PIPELINE_ORG }}
          ADO_PROJECT: ${{ secrets.AZURE_PIPELINE_PROJECT }}
          ADO_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          ACN_CNI_RELEASE_PIPELINE_ID: ${{ secrets.ACN_CNI_RELEASE_PIPELINE_ID }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          MAX_RETRIES="${MAX_PIPELINE_RETRIES}"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "ACN CNI Release Test — Attempt $attempt/$MAX_RETRIES"

            RUN_ID=$(curl -s -u ":${ADO_PAT}" \
              -H "Content-Type: application/json" \
              -d "{\"resources\":{\"repositories\":{\"self\":{\"refName\":\"refs/tags/${NEW_TAG}\"}}},\"templateParameters\":{\"tag\":\"${NEW_TAG}\"}}" \
              "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/pipelines/${ACN_CNI_RELEASE_PIPELINE_ID}/runs?api-version=7.0" \
              | jq -r '.id' 2>/dev/null || echo "")

            if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
              echo "::warning::Failed to trigger ACN CNI Release Test (attempt $attempt)"
              if (( attempt == MAX_RETRIES )); then
                echo "::error::ACN CNI Release Test exhausted all $MAX_RETRIES retries"
                exit 1
              fi
              sleep 60
              continue
            fi

            RUN_URL="https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_build/results?buildId=${RUN_ID}&view=results"
            echo "Triggered run: $RUN_URL"

            poll_elapsed=0
            while true; do
              STATUS=$(curl -s -u ":${ADO_PAT}" \
                "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/build/builds/${RUN_ID}?api-version=7.0" \
                | jq -r '.status' 2>/dev/null || echo "unknown")

              RESULT=$(curl -s -u ":${ADO_PAT}" \
                "https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/build/builds/${RUN_ID}?api-version=7.0" \
                | jq -r '.result' 2>/dev/null || echo "unknown")

              if [[ "$STATUS" == "completed" ]]; then
                if [[ "$RESULT" == "succeeded" ]]; then
                  echo "✅ ACN CNI Release Test succeeded (attempt $attempt)"
                  echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"
                  exit 0
                else
                  echo "❌ ACN CNI Release Test failed with result: $RESULT (attempt $attempt)"
                  break
                fi
              fi
              poll_elapsed=$((poll_elapsed + 120))
              if (( poll_elapsed >= 5400 )); then
                echo "::warning::ACN CNI Release Test timed out after 90 minutes (attempt $attempt)"
                break
              fi
              sleep 120
            done

            if (( attempt == MAX_RETRIES )); then
              echo "::error::ACN CNI Release Test exhausted all $MAX_RETRIES retries"
              exit 1
            fi
            sleep 60
          done

      - name: Post pipeline validation to CNI Teams channel
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_CNI_LOGIC_APP_URL }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
          PR_RUN: ${{ steps.pr_pipeline.outputs.run_url }}
          CNI_RUN: ${{ steps.cni_release.outputs.run_url }}
        run: |
          MSG="✅ <b>Pipeline validation complete for ${NEW_TAG}</b><br><br>• ACN PR Pipeline: ${PR_RUN}<br>• ACN CNI Release Test: ${CNI_RUN}<br>• CNI/CNS Signed Release: Managed DALEC (automatic — tag picked up)"

          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$MSG" | jq -Rs .)}" || true

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 5: Post in Release Channel + Draft R2D
  # ─────────────────────────────────────────────────────────────────────────────
  release_channel_post:
    name: "Step 5: Release Channel + R2D Draft"
    runs-on: ubuntu-latest
    needs: [create_tag, validate_pipelines]
    if: always() && needs.create_tag.result == 'success' && needs.validate_pipelines.result == 'success'
    steps:
      - name: Post release thread in Release Channel
        id: release_thread
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_LOGIC_APP_URL }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
          TARGET_SHA: ${{ needs.create_tag.outputs.target_sha }}
          PREVIOUS_TAG: ${{ needs.create_tag.outputs.previous_tag }}
          PR_RUN: ${{ needs.validate_pipelines.outputs.pr_pipeline_run_url }}
          CNI_RUN: ${{ needs.validate_pipelines.outputs.cni_release_run_url }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          BRANCH="${RELEASE_BRANCH}"
          PR_RUN="${PR_RUN:-_(dry run — skipped)_}"
          CNI_RUN="${CNI_RUN:-_(dry run — skipped)_}"
          DRY_PREFIX=""
          if [[ "$DRY_RUN" == "true" ]]; then
            DRY_PREFIX="🏜️ [DRY RUN] "
          fi
          REPO="${GITHUB_REPOSITORY}"
          COMMIT_LINK="https://github.com/${REPO}/commit/${TARGET_SHA}"
          CHANGELOG_LINK="https://github.com/${REPO}/compare/${PREVIOUS_TAG}...${NEW_TAG}"

          # Post the official release thread template
          RELEASE_MSG="${DRY_PREFIX}@Release I will start the release process for the acn repo (cni/cns/npm) ${NEW_TAG} based on this commit: ${COMMIT_LINK} from the ${BRANCH} branch. I intend for this release to make it to AKS.

          ---
          **SIGNED PATH (CNI/CNS) — Managed DALEC:**
          - Changelog Link: ${CHANGELOG_LINK}
          - CNI Release Test Pipeline Run Link: ${CNI_RUN}
          - ACN PR Pipeline Run Link: ${PR_RUN}
          - Managed DALEC Build: _(automatic — triggered by tag)_
          - Managed DALEC Lead Approval: _(pending — 18hr timeout)_
          - Managed DALEC MCR Publish: _(automatic after approval)_
          - AgentBaker PR Link: _(pending BumpBump)_
          - AKS PR/ENO Link: _(pending)_
          - ENO Release Networking Sig Link: _(pending)_

          ---
          **SIGNED PATH (Other binaries) — Manual pipelines:**
          - ACN Official Build Pipeline Run Link: _(pending — human to trigger)_
          - ACN Official Image Release Pipeline Run Link: _(pending — human to trigger)_
          - Safefly/R2D Link: _(human to fill after filing)_

          ---
          **UNSIGNED PATH CHECKLIST:**
          - Changelog Link: ${CHANGELOG_LINK}
          - CNI Release Test Pipeline Run Link: ${CNI_RUN}
          - ACN PR Pipeline Run Link: ${PR_RUN}
          - GitHub Release Pipeline Run Link: _(pending)_
          - Safefly/R2D Link: _(human to fill after filing)_
          - GitHub Release Link: _(pending)_
          - NA Build Pipeline Run Link: _(pending)_
          - OBP Signed Binaries Pipeline Run Link: _(pending)_"

          echo "Release channel message:"
          echo "$RELEASE_MSG"

          # Post to Teams Release channel via Logic App
          # Send as plain text — Logic App handles rendering
          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$RELEASE_MSG" | jq -Rs .)}" || echo "::warning::Failed to post to Teams Release channel"

      - name: Generate R2D Draft (Unsigned)
        id: r2d_unsigned
        env:
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
          CNI_RUN: ${{ needs.validate_pipelines.outputs.cni_release_run_url }}
        run: |
          set -euo pipefail
          TODAY=$(date +%Y-%m-%d)
          END_DATE=$(date -d "+7 days" +%Y-%m-%d)

          cat <<EOF > /tmp/r2d-unsigned-draft.md
          # R2D DRAFT — UNSIGNED PATH
          ## File at: https://aka.ms/R2D (Clone from Request #193479)

          | Field | Value |
          |-------|-------|
          | Service Name | Azure Container Networking |
          | Change Title | CNI/CNS Github Release ${NEW_TAG} |
          | Change Description | Release ${NEW_TAG} binaries to our Github Release page to be consumed by ACI |
          | Engineering Director | R2D-AzNet-SDN-ED-GRP |
          | CVP | R2D-AzNet-CVP-GRP |
          | Additional Users to Notify | tamanoha@microsoft.com |
          | Deployment Type | regular |
          | Deployment Tool | ev2 |
          | Service Group Name | microsoft.azure.networking.containernetworking.githubrelease |
          | Build Number | _(fill from Github Release Pipeline run)_ |
          | ADO Build Link | _(fill from Github Release Pipeline run)_ |
          | SFI Changes? | no |
          | Anticipated Start Date | ${TODAY} |
          | Anticipated End Date | ${END_DATE} |
          | Targeted Regions | All regions |
          | Covered by lease? | No |
          | Nature of Deployment | General bug fixes, New feature |
          | Deployment Following SDP | Standard SDP |
          | Retakes? | no |
          | Impact Type to Customer | None |
          | Expected duration of impact | 0 |
          | Blast Radius | Single Cluster |
          | Pre-Prod Testing Types | End to End Testing (${CNI_RUN}) |
          | Rollback/Roll-Forward | DRI determines rollback or rollforward in real time based on the issue |
          | Rollback Tested | yes |
          | Average Rollback Time | 01:00 (HH:MM) |
          | Health signals integration | yes — Binaries are consumed by partners who have health checks |
          | R2D Risk | Low |
          | Team Assessed Risk | Low |
          | Deployment Impact | Zero Impact |
          | Auto Approval | Disabled |
          EOF

          echo "✅ Unsigned R2D draft generated at /tmp/r2d-unsigned-draft.md"
          cat /tmp/r2d-unsigned-draft.md

      - name: Generate R2D Draft (Signed)
        id: r2d_signed
        env:
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
          PR_RUN: ${{ needs.validate_pipelines.outputs.pr_pipeline_run_url }}
          CNI_RUN: ${{ needs.validate_pipelines.outputs.cni_release_run_url }}
        run: |
          set -euo pipefail
          TODAY=$(date +%Y-%m-%d)
          END_DATE=$(date -d "+7 days" +%Y-%m-%d)

          cat <<EOF > /tmp/r2d-signed-draft.md
          # R2D DRAFT — SIGNED PATH
          ## File at: https://aka.ms/R2D (Clone from Request #174991)

          | Field | Value |
          |-------|-------|
          | Service Name | Azure Container Networking |
          | Change Title | CNS and CNI release ${NEW_TAG} |
          | Change Description | _(describe key changes in this release)_ |
          | Engineering Director | AzNet_R2D_GroupA_SM, R2D-AzNet-SDN-ED-GRP |
          | CVP | AzNet_R2D_CVP, R2D-AzNet-CVP-GRP |
          | Additional Users to Notify | _(add leads if needed)_ |
          | Deployment Type | regular |
          | Deployment Tool | ev2 |
          | Service Group Name | microsoft.azure.networking.containernetworking |
          | Build Number | _(fill from ACN Official Build Pipeline run)_ |
          | ADO Build Link | _(fill from ACN Official Build Pipeline run)_ |
          | SFI Changes? | no |
          | Anticipated Start Date | ${TODAY} |
          | Anticipated End Date | ${END_DATE} |
          | Targeted Regions | All regions |
          | Covered by lease? | No |
          | Nature of Deployment | New feature |
          | Deployment Following SDP | Standard SDP |
          | Retakes? | no |
          | Impact Type to Customer | None |
          | Expected duration of impact | 0 |
          | Blast Radius | Single Cluster |
          | Pre-Prod Testing Types | Unit Testing + Integration Testing (${PR_RUN}, ${CNI_RUN}) |
          | Rollback/Roll-Forward | DRI determines rollback or rollforward in real time based on the issue |
          | Rollback Tested | yes |
          | Average Rollback Time | 00:01 (HH:MM) |
          | Health signals integration | yes — AKS-Swift deployment follows AKS service health checks |
          | R2D Risk | Low |
          | Team Assessed Risk | Low |
          | Deployment Impact | Zero Impact |
          | Auto Approval | Disabled |
          EOF

          echo "✅ Signed R2D draft generated at /tmp/r2d-signed-draft.md"
          cat /tmp/r2d-signed-draft.md

      - name: Post R2D drafts summary to Release thread
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_RELEASE_LOGIC_APP_URL }}
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
        run: |
          R2D_MSG="📋 <b>R2D Drafts prepared for ${NEW_TAG}:</b><br><br><b>UNSIGNED</b> — Clone from SafeFly Request #193479<br>• Service Group: microsoft.azure.networking.containernetworking.githubrelease<br>• File at: https://aka.ms/R2D<br><br><b>SIGNED</b> — Clone from SafeFly Request #174991<br>• Service Group: microsoft.azure.networking.containernetworking<br>• File at: https://aka.ms/R2D<br><br>⚠️ <b>Human action required:</b> File both R2Ds, then post the Safefly/R2D links back in this thread."

          curl -sf -o /dev/null -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":$(echo "$R2D_MSG" | jq -Rs .)}" || echo "::warning::Failed to post R2D summary"

      - name: Send email to leads
        env:
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
        run: |
          echo "📧 Email notification (manual step or integrate with Logic App/Power Automate):"
          echo "  To: chandan.aggarwal@microsoft.com, neaggarw@microsoft.com, tamanoha@microsoft.com, caggard@microsoft.com"
          echo "  Subject: ACN Release ${NEW_TAG}"
          echo "  Body: I am currently making a CNI/CNS/NPM release for ${NEW_TAG}."
          # NOTE: Email sending requires integration with a mail service (Graph API, Logic App, etc.)
          # This step serves as documentation of the requirement

      - name: Write workflow summary
        env:
          NEW_TAG: ${{ needs.create_tag.outputs.new_tag }}
